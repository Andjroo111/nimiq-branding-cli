<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CloseButton — truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Mulish', sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: white;
    }

    /* CloseButton.vue scoped CSS, exactly as Vue's scoped compiler emits it:
       `button` -> `button[data-v-x]` etc. The attribute selector is required —
       it lifts specificity to (0,1,1) so these rules beat .nq-button-s (0,1,0),
       just like in the real component. */
    button[data-v-close] {
        font-size: 3rem;
        padding: 0;
        background: none !important;
        height: 3rem;
    }

    button[data-v-close]::before {
        border-radius: 50%;
    }

    button .nq-icon[data-v-close] {
        opacity: .2;
        transition: opacity .3s var(--nimiq-ease);
    }

    button:hover .nq-icon[data-v-close],
    button:active .nq-icon[data-v-close],
    button:focus .nq-icon[data-v-close] {
        opacity: .4;
    }

    button.top-right[data-v-close] {
        position: absolute;
        top: 2rem;
        right: 2rem;
    }
</style>
</head>
<body>
    <!-- CloseButton template, expanded for the default resting state:
         <button class="close-button nq-button-s"><CloseIcon/></button>
         CloseIcon = @nimiq/style/src/icons/close.svg rendered with class nq-icon -->
    <button class="close-button nq-button-s" data-v-close><svg data-v-close class="nq-icon" width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M3.528 3.52c4.683-4.684 12.275-4.686 16.96-.005 4.678 4.69 4.678 12.28 0 16.97-4.685 4.68-12.277 4.678-16.96-.005-4.682-4.684-4.682-12.276 0-16.96zm13.145 13.133a1 1 0 0 0 .036-1.374l-3.11-3.11a.25.25 0 0 1 0-.352l3.11-3.11a1 1 0 1 0-1.414-1.415l-3.11 3.11a.25.25 0 0 1-.354 0l-3.11-3.11a1 1 0 0 0-1.41 1.415l3.11 3.11a.249.249 0 0 1 0 .353l-3.11 3.109a1 1 0 0 0 0 1.415c.396.38 1.021.38 1.416 0l3.109-3.11a.252.252 0 0 1 .354 0l3.11 3.11a1 1 0 0 0 1.373-.041z" fill="currentColor"/></svg></button>
</body>
</html>
