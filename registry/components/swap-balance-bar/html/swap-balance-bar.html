<!-- Nimiq SwapBalanceBar snippet (static frozen state — dragging lives in the Vue port).
     Sample: NIM "Indigo Address" 519 NIM solid navy at 46% | BTC 0.00 -> +0.00000476 BTC
     at 54%, fully hatched (.change width 100% = whole BTC side is incoming).
     To adapt: set the two .bar inline widths (they should sum to ~99%), the .change
     widths, the 46%/54% scale labels, the labels/amounts in the header, and the two
     connector svg widths/viewBox/paths (hand-computed from the upstream CurvedLine
     formulas; regenerate via the Vue port for other distributions).
     Size via a container: upstream renders at 55.5rem = 444px. -->
<div class="swap-balance-bar flex-column">
    <div class="balance-bar-header flex-row">
        <button class="reset left nimiq currency single">
            <div class="identicon-stack">
                <div class="identicon primary" data-address="NQ87 JY9X JUEE HA17 JNBB HPGM 5ETQ VT1G CVN2"><img src='data:image/svg+xml,<svg width="64" height="64" viewBox="0 -4 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity=".1" d="M62.3 25.4L49.2 2.6A5.3 5.3 0 0 0 44.6 0H18.4c-1.9 0-3.6 1-4.6 2.6L.7 25.4c-1 1.6-1 3.6 0 5.2l13.1 22.8c1 1.6 2.7 2.6 4.6 2.6h26.2c1.9 0 3.6-1 4.6-2.6l13-22.8c1-1.6 1-3.6.1-5.2z" fill="url(%23identicon_radial)"/><defs><radialGradient id="identicon_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(-63.0033 0 0 -56 63 56)"><stop stop-color="%23260133"/><stop offset="1" stop-color="%231F2348"/></radialGradient></defs></svg>' alt="Nimiq identicon"></div>
            </div>
            <label>Indigo Address</label>
            <span class="amount">519 <span class="currency nim">NIM</span></span>
        </button>
        <div class="currency right bitcoin">
            <label>Bitcoin</label>
            <span class="amount">0.00 <span class="currency btc">BTC</span></span>
            <svg width="42" height="42" viewBox="0 0 42 42" fill="currentColor" xmlns="http://www.w3.org/2000/svg" class="bitcoin">
                <circle fill="#fff" cx="21" cy="21" r="18" />
                <path fill-rule="evenodd" clip-rule="evenodd" d="M15.918 41.371c11.253 2.805 22.649-4.04 25.454-15.291C44.176 14.83 37.33 3.433 26.077.628 14.828-2.176 3.433 4.67.629 15.922c-2.806 11.25 4.041 22.645 15.289 25.45zm10.31-29.01c3.041.997 5.265 2.49 4.828 5.27-.316 2.033-1.501 3.018-3.075 3.364 2.161 1.07 3.26 2.712 2.213 5.557-1.3 3.533-4.388 3.831-8.495 3.092l-.998 3.8-2.407-.571.983-3.75a96.07 96.07 0 01-1.919-.474l-.986 3.768-2.406-.571.997-3.807-.652-.161c-.351-.087-.706-.175-1.065-.26l-3.135-.744 1.196-2.623s1.775.448 1.75.415c.682.16.985-.262 1.104-.544l1.575-6.007.255.06a2.197 2.197 0 00-.25-.076l1.123-4.288c.03-.487-.147-1.101-1.122-1.333.038-.024-1.75-.413-1.75-.413l.641-2.448 3.322.79-.003.011c.5.118 1.014.23 1.538.344L20.477 7l2.407.571-.967 3.69c.644.137 1.288.281 1.93.431l.96-3.664 2.408.57-.986 3.764zm-7.622 13.646c1.964.494 6.264 1.575 6.947-1.037.7-2.667-3.463-3.556-5.496-3.991-.229-.049-.43-.092-.594-.13l-1.323 5.043c.134.031.291.07.466.115zm1.857-7.369c1.638.416 5.212 1.324 5.835-1.048.636-2.428-2.838-3.159-4.535-3.516-.19-.04-.359-.076-.496-.108l-1.2 4.574c.114.027.247.06.396.098z"/>
            </svg>
        </div>
    </div>
    <div class="connecting-lines">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" style="width: 82px; height: 35px;" viewBox="0 0 82 35" class="right">
            <path stroke="#1F2348" stroke-width="1.5" opacity=".24"
                d="M 1 1 v 1 s 0 6.055 8.055 9.055 S 64.889 19.945 72.945 22.945 s 8.055 9.055 8.055 9.055 v 1" />
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" style="width: 98px; height: 35px;" viewBox="0 0 98 35" class="left">
            <path stroke="#1F2348" stroke-width="1.5" opacity=".24"
                d="M 1 1 v 1 s 0 6.899 9.899 9.899 S 77.201 19.101 87.101 22.101 s 9.899 9.899 9.899 9.899 v 1" />
        </svg>
    </div>
    <div class="balance-bar flex-row">
        <div class="bar left flex-row active nq-blue" style="width: 45.8181%;">
            <div class="change" style="width: 0%;"></div>
        </div>
        <div class="separator nq-light-blue-bg">
            <div class="handle"></div>
        </div>
        <div class="bar right flex-row active bitcoin" style="width: 53.1918%;">
            <div class="change" style="width: 100%;"></div>
        </div>
    </div>
    <div class="scale flex-row">
        <div class="tenth"><div class="left-total-percent">46%</div></div>
        <div class="tenth"></div>
        <div class="tenth"></div>
        <div class="tenth"></div>
        <div class="tenth"></div>
        <div class="tenth"></div>
        <div class="tenth"></div>
        <div class="tenth"></div>
        <div class="tenth"></div>
        <div class="tenth"><div class="right-total-percent">54%</div></div>
    </div>
    <div class="equilibrium-point nq-light-blue-bg hidden" style="left: 0%;"></div>
</div>

<script type="module">
    import Iqons from 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.js';
    Iqons.svgPath = 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.svg';

    // Scoped to swap-balance-bar roots; safe with multiple snippets on one page.
    for (const el of document.querySelectorAll('.swap-balance-bar .identicon[data-address]')) {
        el.querySelector('img').src = await Iqons.toDataUrl(el.dataset.address);
    }
</script>
