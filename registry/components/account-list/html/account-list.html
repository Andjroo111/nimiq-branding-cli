<!-- Nimiq AccountList snippet.
     One .account-entry per account: identicon + label + balance, with a caret
     that slides in on hover. Each identicon img starts on the hexagon
     placeholder and is swapped to the generated iqon by the script below
     (keyed off its own data-address, so multiple lists on one page are fine).
     Set the list width on .account-list (rows inset themselves by 2rem). -->
<div class="account-list">
    <a href="javascript:void(0)" class="account-entry">
        <div class="account row">
            <div class="identicon-and-label">
                <div class="identicon" data-address="NQ11 MAIN ACCO UNT0 0000 0000 0000 0000 001X">
                    <img src='data:image/svg+xml,<svg width="64" height="64" viewBox="0 -4 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity=".1" d="M62.3 25.4L49.2 2.6A5.3 5.3 0 0 0 44.6 0H18.4c-1.9 0-3.6 1-4.6 2.6L.7 25.4c-1 1.6-1 3.6 0 5.2l13.1 22.8c1 1.6 2.7 2.6 4.6 2.6h26.2c1.9 0 3.6-1 4.6-2.6l13-22.8c1-1.6 1-3.6.1-5.2z" fill="url(%23identicon_radial)"/><defs><radialGradient id="identicon_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(-63.0033 0 0 -56 63 56)"><stop stop-color="%23260133"/><stop offset="1" stop-color="%231F2348"/></radialGradient></defs></svg>' alt="Nimiq identicon">
                </div>
                <div class="label">Main Account</div>
            </div>
            <span class="amount balance">12&#8239;345.6789 <span class="currency nim">NIM</span></span>
        </div>
        <svg class="nq-icon caret" viewBox="0 0 10 11" xmlns="http://www.w3.org/2000/svg"><path d="M5.00098 2L8.53602 5.53603L5.00098 9.07107" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="javascript:void(0)" class="account-entry">
        <div class="account row">
            <div class="identicon-and-label">
                <div class="identicon" data-address="NQ38 SAVI NGS0 0000 0000 0000 0000 0000 0002">
                    <img src='data:image/svg+xml,<svg width="64" height="64" viewBox="0 -4 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity=".1" d="M62.3 25.4L49.2 2.6A5.3 5.3 0 0 0 44.6 0H18.4c-1.9 0-3.6 1-4.6 2.6L.7 25.4c-1 1.6-1 3.6 0 5.2l13.1 22.8c1 1.6 2.7 2.6 4.6 2.6h26.2c1.9 0 3.6-1 4.6-2.6l13-22.8c1-1.6 1-3.6.1-5.2z" fill="url(%23identicon_radial)"/><defs><radialGradient id="identicon_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(-63.0033 0 0 -56 63 56)"><stop stop-color="%23260133"/><stop offset="1" stop-color="%231F2348"/></radialGradient></defs></svg>' alt="Nimiq identicon">
                </div>
                <div class="label">Savings</div>
            </div>
            <span class="amount balance">2500.00 <span class="currency nim">NIM</span></span>
        </div>
        <svg class="nq-icon caret" viewBox="0 0 10 11" xmlns="http://www.w3.org/2000/svg"><path d="M5.00098 2L8.53602 5.53603L5.00098 9.07107" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="javascript:void(0)" class="account-entry">
        <div class="account row">
            <div class="identicon-and-label">
                <div class="identicon" data-address="NQ09 P0CK ETM0 NEY0 0000 0000 0000 0000 0003">
                    <img src='data:image/svg+xml,<svg width="64" height="64" viewBox="0 -4 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity=".1" d="M62.3 25.4L49.2 2.6A5.3 5.3 0 0 0 44.6 0H18.4c-1.9 0-3.6 1-4.6 2.6L.7 25.4c-1 1.6-1 3.6 0 5.2l13.1 22.8c1 1.6 2.7 2.6 4.6 2.6h26.2c1.9 0 3.6-1 4.6-2.6l13-22.8c1-1.6 1-3.6.1-5.2z" fill="url(%23identicon_radial)"/><defs><radialGradient id="identicon_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(-63.0033 0 0 -56 63 56)"><stop stop-color="%23260133"/><stop offset="1" stop-color="%231F2348"/></radialGradient></defs></svg>' alt="Nimiq identicon">
                </div>
                <div class="label">Pocket Money</div>
            </div>
            <span class="amount balance">49.92 <span class="currency nim">NIM</span></span>
        </div>
        <svg class="nq-icon caret" viewBox="0 0 10 11" xmlns="http://www.w3.org/2000/svg"><path d="M5.00098 2L8.53602 5.53603L5.00098 9.07107" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
</div>

<script type="module">
    import Iqons from 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.js';
    // Identicon sprite: the REAL @nimiq/iqons@1.6.0 iqons.min.svg is vendored at ../../../../assets/img/iqons.min.svg
    // (consumer projects: `nq add` copies it to ./nimiq/assets/img/iqons.min.svg). The iqons LIBRARY import
    // above stays on the jsdelivr pin — it is code, not artwork. The CDN sprite (byte-identical content)
    // is only the fallback when the local copy is unreachable (e.g. file:// contexts that block fetch).
    const localIqonsSprite = '../../../../assets/img/iqons.min.svg';
    const cdnIqonsSprite = 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.svg';
    Iqons.svgPath = await fetch(localIqonsSprite, { method: 'HEAD' }).then((r) => (r.ok ? localIqonsSprite : cdnIqonsSprite)).catch(() => cdnIqonsSprite);

    // Keyed off each element's own data-address: idempotent and safe when this
    // snippet (or the identicon snippet) appears multiple times on a page.
    for (const el of document.querySelectorAll('.account-list .identicon[data-address]')) {
        el.querySelector('img').src = await Iqons.toDataUrl(el.dataset.address);
    }
</script>
