<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card — truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; }
</style>
</head>
<body>
    <!-- nq-card from @nimiq/style demo.html (card-component section), sample state:
         header with nq-h1 "Card Title", body text, footer with an nq-button.
         All visual styling comes from the framework CSS (.nq-card / -header / -body / -footer). -->
    <div class="nq-card">
        <div class="nq-card-header">
            <h1 class="nq-h1">Card Title</h1>
        </div>
        <div class="nq-card-body">
            <p class="nq-text">This is the card body. Cards group related content with a header, body and footer.</p>
        </div>
        <div class="nq-card-footer">
            <button class="nq-button">Continue</button>
        </div>
    </div>
</body>
</html>
