<!-- Card: standard Nimiq content card. Requires nimiq-style (legacy) for all styling.
     Header and footer are optional; .nq-card-header supports an extra
     <p class="nq-notice warning"> line under the headline (see @nimiq/style demo). -->
<div class="nq-card">
    <div class="nq-card-header">
        <h1 class="nq-h1">Card Title</h1>
    </div>
    <div class="nq-card-body">
        <p class="nq-text">This is the card body. Cards group related content with a header, body and footer.</p>
    </div>
    <div class="nq-card-footer">
        <button class="nq-button">Continue</button>
    </div>
</div>
