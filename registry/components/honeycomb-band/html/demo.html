<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>honeycomb-band</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="honeycomb-band.css">
<style>
    html, body { margin: 0; padding: 0; background: #fff; }
    body { font-family: 'Mulish', sans-serif; }
</style>
</head>
<body>
<!-- honeycomb-band: nimiq.com community honeycomb band.
     Blue "Community →" pill centered above the REAL nimiq.com section background
     assets/img/bg-hexagons.svg (2795x544, currentColor hexagons at .01-.06 opacity,
     swept from www.nimiq.com inline CSS as custom--bg-hexagons), rendered 1:1 as a
     CSS mask filled with currentColor (site text navy #1F2348) — exactly how the
     live page colors it. Three brand-colored social hexagons (YouTube red, X black,
     Facebook blue) are overlaid on exact lattice cells of that background; their
     hexagon shape is the path extracted verbatim from bg-hexagons.svg and their
     glyphs are the REAL nimiq-icons mono logos
     (assets/logos/nimiq-icons-logos/logos-{youtube,twitter,facebook}-mono.svg),
     applied as white CSS masks in honeycomb-band.css. Requires honeycomb-band.css +
     Mulish (Google Fonts). No JS. Asset urls in the CSS resolve here as
     ../../../../assets/…; `nq add` copies them into consumer projects at
     ./nimiq/assets/… -->
<section class="nq-honeycomb-band">
    <a class="nq-honeycomb-band__cta" href="#">Community
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2.5 8h10.4M8.6 3.6 13 8l-4.4 4.4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </a>

    <div class="nq-honeycomb-band__band">
        <!-- 2795x544 canvas centered + clipped at the section edges; the social
             hexagons sit on the asset's own lattice (107.5px column step, 124px
             row step, 62px half-offsets). -->
        <div class="nq-honeycomb-band__canvas">
            <div class="nq-honeycomb-band__bg" aria-hidden="true"></div>
            <a class="nq-honeycomb-band__hex nq-honeycomb-band__hex--youtube" href="#" aria-label="YouTube">
                <svg class="nq-honeycomb-band__glyph nq-honeycomb-band__glyph--youtube" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 18"><g fill="none"><g clip-path="url(#nimiq-logos-youtube-mono-5dadh)"><path fill="currentColor" fill-rule="evenodd" d="M24.206 1.373c.398.397.684.892.831 1.435.846 3.403.65 8.778.017 12.313a3.22 3.22 0 01-2.266 2.266c-1.987.541-9.982.541-9.982.541s-7.996 0-9.982-.541A3.22 3.22 0 01.558 15.12c-.85-3.389-.617-8.767-.017-12.297A3.22 3.22 0 012.807.558C4.794.016 12.79 0 12.79 0s7.995 0 9.982.542a3.2 3.2 0 011.434.83m-7.329 7.591-6.632 3.842V5.122z" clip-rule="evenodd"/></g><defs><clipPath id="nimiq-logos-youtube-mono-5dadh"><path fill="#fff" d="M0 0h25.605v18H0z"/></clipPath></defs></g></svg>
            </a>
            <a class="nq-honeycomb-band__hex nq-honeycomb-band__hex--x" href="#" aria-label="X (Twitter)">
                <svg class="nq-honeycomb-band__glyph nq-honeycomb-band__glyph--x" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18"><path d="M13.654 1.688h2.48l-5.42 6.195 6.377 8.43h-4.994L8.187 11.2l-4.475 5.113H1.23l5.797-6.627L.911 1.688H6.03L9.565 6.36zm-.871 13.14h1.375L5.284 3.095H3.808z" fill="currentColor"/></svg>
            </a>
            <a class="nq-honeycomb-band__hex nq-honeycomb-band__hex--facebook" href="#" aria-label="Facebook">
                <svg class="nq-honeycomb-band__glyph nq-honeycomb-band__glyph--facebook" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18"><g fill="none"><g clip-path="url(#nimiq-logos-facebook-mono-7d36y6)"><path fill="currentColor" d="M18 9a9 9 0 10-10.406 8.89v-6.288H5.309V9h2.285V7.016c0-2.255 1.343-3.5 3.4-3.5.984 0 2.013.175 2.013.175v2.215h-1.134c-1.118 0-1.467.694-1.467 1.406V9h2.497l-.4 2.602h-2.097v6.289A9 9 0 0018 9"/></g><defs><clipPath id="nimiq-logos-facebook-mono-7d36y6"><path fill="#fff" d="M0 0h18v18H0z"/></clipPath></defs></g></svg>
            </a>
        </div>
    </div>
</section>
</body>
</html>
