<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Account Header — truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; margin: 0; }

    /* ============================================================
       Hand-expanded composition of the wallet AddressOverview header:
       - AddressOverview.vue .active-address + .actions (scoped SCSS expanded)
       - SearchBar.vue (scoped)
       - StakingButton.vue + StakingIcon.vue (scoped, gradients=false)
       - vue-components Tooltip.vue base styles (position-bottom subset)
       Wallet theme vars from src/scss/themes.scss applied on the root.
       ============================================================ */

    .account-header {
        /* wallet themes.scss defaults */
        --bg-primary: var(--nimiq-white);
        --text-16: rgba(31, 35, 72, 0.16);
        --text-22: rgba(31, 35, 72, 0.22);
        --light-blue-40: rgba(5, 130, 202, 0.4);
        --body-size: 2rem;
        --h1-size: 3rem;
        --large-button-size: 2rem;
        --attr-duration: 300ms;
        /* AddressOverview.vue defaults at 1440px */
        --padding: 4rem;
        --padding-bottom: 6rem;

        display: flex;
        flex-direction: column;
        position: relative;
        background: var(--bg-primary);
        color: var(--nimiq-blue);
        /* composition chrome: reserve room for the staking CTA tooltip, which in
           the wallet overlays the transaction list below */
        padding-bottom: 9rem;
    }

    /* wallet main.css globals (themes.scss) */
    .flex-row { display: flex; flex-direction: row; }
    .ml-auto { margin-left: auto; }
    button.reset {
        background: none; border: none; padding: 0; margin: 0;
        font-family: inherit; font-size: inherit; color: inherit; cursor: pointer;
    }

    /* ---- AddressOverview.vue .active-address ---- */
    .active-address {
        flex-shrink: 0;
        align-items: center;
        padding: calc(var(--padding) + 2rem);
        padding-right: calc(var(--padding) + 4rem);
        padding-bottom: var(--padding-bottom);
    }

    .active-address .identicon-wrapper {
        position: relative;
        margin-right: 4rem;
    }

    .active-address .identicon {
        height: 11.25rem;
        width: 11.25rem;
        margin: -0.625rem 0; /* size identicon to be 90x80 px */
        flex-shrink: 0;
    }
    .identicon img { width: 100%; height: 100%; } /* vue-components Identicon */

    .active-address .meta {
        flex-grow: 1;
        min-width: 0;
    }
    .active-address .meta .flex-row { align-items: center; }

    .active-address .address,
    .active-address .label {
        flex-grow: 1;
        overflow: hidden;
        white-space: nowrap;
    }

    .active-address .label,
    .active-address .amount {
        --size: var(--h1-size);
        font-size: var(--size);
        margin-top: 0.25rem;
    }

    .active-address .address,
    .active-address .fiat-amount {
        --size: var(--body-size);
        font-size: var(--size);
        opacity: 0.5;
    }

    .active-address .label {
        font-weight: 600;
        margin-bottom: 0.75rem;
        margin-right: 3rem;
        mask: linear-gradient(90deg, white, white calc(100% - 3rem), rgba(255,255,255, 0));
    }

    .active-address .address {
        word-spacing: -0.2em;
        font-family: 'Fira Mono', monospace;
        transition: opacity .3s var(--nimiq-ease);
    }

    .active-address .copyable {
        padding: 0.5rem 1rem;
        margin-left: -1rem;
        min-width: 0;
        margin-right: 3rem;
    }

    .active-address .fiat-amount { margin-left: auto; }

    .active-address .amount,
    .active-address .fiat-amount { flex-shrink: 0; }

    .active-address .amount {
        font-weight: bold;
        margin-bottom: 0.5rem;
        white-space: nowrap; /* vue-components Amount.vue */
    }

    .active-address .fiat-amount {
        font-weight: 600;
        line-height: 1;
    }

    /* ---- AddressOverview.vue .actions ---- */
    .actions {
        position: relative;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin: 0 var(--padding) 2rem;
        padding: 0 3rem 0 2rem;
    }
    .actions button { flex-shrink: 0; }
    .actions .nq-button-pill { white-space: nowrap; }

    .actions .vertical-separator {
        background: rgba(31, 35, 72, 0.15);
        border-radius: 2rem;
        width: 1.5px;
        height: 3rem;
        margin-top: 0.625rem;
        margin-bottom: 0.625rem;
        margin-left: 2rem;
        margin-right: .5rem;
    }

    .send, .receive {
        margin: 0 0.5rem;
        align-items: center;
        padding: 1.125rem 2rem;
        height: unset;
        line-height: 1;
        border-radius: 500px;
        font-size: var(--large-button-size);
    }
    .send .nq-icon, .receive .nq-icon {
        width: 1.5rem;
        height: 1.5rem;
        margin-right: 1rem;
    }
    .send { margin-left: 1.5rem; }
    .send .nq-icon { transform: rotateZ(-90deg); }
    .receive { margin-right: 0; }
    .receive .nq-icon { transform: rotateZ(90deg); }

    /* ---- SearchBar.vue (scoped) ---- */
    .actions .container {
        width: 100%;
        min-width: 5.5rem;
    }
    .search-bar {
        --default-sb-width: clamp(5.5rem, 100%, 30rem);
        position: relative;
        display: flex;
        flex-direction: row;
        align-items: center;
        width: 100%;
        cursor: text;
        padding: 0.75rem 0;
        min-width: var(--default-sb-width);
        max-width: var(--default-sb-width); /* JS: maxWidth when not active */
    }
    .search-bar::after {
        content: '';
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        box-shadow: inset 0 0 0 0.1875rem var(--text-16);
        border-radius: 500px;
        transition: box-shadow var(--attr-duration) var(--nimiq-ease);
    }
    .search-bar > svg {
        justify-self: left;
        flex-grow: 0;
        margin-left: 1.75rem;
        margin-right: 1rem;
        flex-shrink: 0;
        opacity: 0.4;
        width: 1.75rem;
        height: 1.75rem;
    }
    .search-bar input {
        font-family: inherit;
        font-weight: 600;
        color: inherit;
        justify-self: right;
        flex-grow: 1;
        border: 0;
        line-height: 2.75rem;
        font-size: var(--body-size);
        margin: 0;
        padding: 0;
        padding-right: 4rem;
        background: none;
        min-width: 0;
    }
    .search-bar input::placeholder {
        font-weight: normal;
        color: inherit;
        opacity: 0.4;
    }

    /* ---- StakingButton.vue (scoped) ---- */
    .staking-button {
        position: relative;
        height: 6.75rem;
        margin: -1.25rem 0;
    }
    .staking-button svg { font-size: 6.75rem; }
    .staking-button.show-text {
        display: flex;
        align-items: center;
    }
    .stake {
        display: block;
        background-color: transparent;
        border: 0;
        cursor: pointer;
        padding: 0;
    }
    .show-text .stake {
        display: flex;
        align-items: center;
        height: 4.25rem;
        border-radius: 20rem;
        padding-right: 1.875rem;
        justify-content: center;
    }
    .show-text .stake .staking-icon {
        margin-right: -1rem;
        margin-left: -.5rem;
    }

    /* ---- StakingIcon.vue (scoped) ---- */
    .staking-icon { font-size: 0; }
    .staking-icon path:nth-child(1),
    .staking-icon path:nth-child(2),
    .staking-icon path:nth-child(4) { opacity: 0; }
    .staking-icon path:nth-child(1) { stroke-opacity: .8; }
    .staking-icon path:nth-child(2) { stroke-opacity: .6; }
    .staking-icon path:nth-child(4) { stroke-opacity: .4; }

    /* ---- vue-components Tooltip.vue base (bottom-position subset) ---- */
    .tooltip {
        display: inline-block;
        position: relative;
        line-height: 1;
    }
    .tooltip .trigger {
        position: relative;
        display: inline-block;
        vertical-align: bottom;
        text-decoration: none;
        outline: none;
        cursor: default;
        color: inherit;
    }
    .tooltip .trigger::after {
        opacity: 0;
        content: '';
        display: block;
        position: absolute;
        width: 2.25rem;
        height: 2rem;
        left: calc(50% - 1.125rem);
        mask-image: url('data:image/svg+xml,<svg viewBox="0 0 18 16" xmlns="http://www.w3.org/2000/svg"><path d="M9 7.12c-.47 0-.93.2-1.23.64L3.2 14.29A4 4 0 0 1 0 16h18a4 4 0 0 1-3.2-1.7l-4.57-6.54c-.3-.43-.76-.64-1.23-.64z" fill="white"/></svg>');
        transition: opacity .3s var(--nimiq-ease), .3s visibility;
        transition-delay: 16ms;
        visibility: hidden;
        z-index: 1000;
    }
    .tooltip[class*='position-bottom'] .trigger::after {
        top: 100%;
        background: var(--background, var(--nimiq-blue));
    }
    .tooltip.shown .trigger::after {
        opacity: 1;
        visibility: visible;
    }
    .tooltip .tooltip-box {
        contain: layout paint style;
        position: absolute;
        color: white;
        background: var(--background, var(--nimiq-blue-bg));
        padding: 1.5rem;
        border-radius: .5rem;
        font-size: 1.75rem;
        line-height: 1.5;
        font-weight: 600;
        box-shadow: 0 1.125rem 2.275rem rgba(0, 0, 0, 0.11);
        z-index: 999;
    }
    .tooltip[class*='position-bottom'] .tooltip-box {
        transform: translateY(2rem);
    }

    /* ---- StakingButton.vue .staking-feature-tip (scoped, ::v-deep expanded) ---- */
    .tooltip.staking-feature-tip,
    .tooltip.staking-feature-tip .trigger {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        height: 100%;
        width: 100%;
        z-index: 3;
    }
    .tooltip.staking-feature-tip .trigger::after {
        background-color: var(--nimiq-green);
        transform: translateY(calc(-1rem + 1px));
    }
    .tooltip.staking-feature-tip .tooltip-box {
        background: var(--nimiq-green-bg);
        color: white;
        font-size: 1.75rem;
        font-style: normal;
        font-weight: 700;
        line-height: 140%;
        padding: 0.5rem 1rem;
        white-space: nowrap;
        transform: translateY(1rem);
    }
</style>
</head>
<body>
<div class="account-header" style="width: 880px;">

    <div class="active-address flex-row">
        <div class="identicon-wrapper">
            <div class="identicon" data-address="NQ87 JY9X JUEE HA17 JNBB HPGM 5ETQ VT1G CVN2">
                <img src='data:image/svg+xml,<svg width="64" height="64" viewBox="0 -4 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity=".1" d="M62.3 25.4L49.2 2.6A5.3 5.3 0 0 0 44.6 0H18.4c-1.9 0-3.6 1-4.6 2.6L.7 25.4c-1 1.6-1 3.6 0 5.2l13.1 22.8c1 1.6 2.7 2.6 4.6 2.6h26.2c1.9 0 3.6-1 4.6-2.6l13-22.8c1-1.6 1-3.6.1-5.2z" fill="url(%23identicon_radial)"/><defs><radialGradient id="identicon_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(-63.0033 0 0 -56 63 56)"><stop stop-color="%23260133"/><stop offset="1" stop-color="%231F2348"/></radialGradient></defs></svg>' alt="Nimiq identicon">
            </div>
        </div>
        <div class="meta">
            <div class="flex-row">
                <div class="label">Indigo Address</div>
                <span class="amount">995 <span class="currency nim">NIM</span></span>
            </div>
            <div class="flex-row">
                <div class="copyable">
                    <div class="address">NQ87 JY9X JUEE HA17 JNBB HPGM 5ETQ VT1G CVN2</div>
                </div>
                <span class="fiat-amount">$0.50</span>
            </div>
        </div>
    </div>

    <div class="actions flex-row">
        <div class="container">
            <div class="search-bar cover-all">
                <svg fill="none" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="2" />
                    <path d="M13.31 14.73a1 1 0 001.42-1.42l-1.42 1.42zM8.3 9.7l5.02 5.02 1.42-1.42L9.7 8.3 8.29 9.71z" fill="currentColor" />
                </svg>
                <input type="text" placeholder="Search transactions">
            </div>
        </div>

        <div class="flex-row ml-auto">
            <div class="staking-button show-text">
                <span class="tooltip staking-feature-tip position-bottom-center shown">
                    <a href="javascript:void(0);" tabindex="0" class="trigger"></a>
                    <div class="tooltip-box" style="top: 100%; left: 50%; transform: translate(-50%, 1rem);">
                        Earn NIM every month by staking your NIM
                    </div>
                </span>
                <button class="stake nq-button-pill green">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" class="nq-icon staking-icon">
                        <path opacity=".6" fill="none" stroke="#21bca5" stroke-width="3.02" d="M70 22h0a48 48 0 0148 48v0a48 48 0 01-48 48h0a48 48 0 01-48-48v0a48 48 0 0148-48z"/>
                        <path opacity=".4" fill="none" stroke="#21bca5" stroke-width="3.02" d="M70 12h0a58 58 0 0158 58h0a58 58 0 01-58 58h0a58 58 0 01-58-58h0a58 58 0 0158-58z" />
                        <path opacity=".2" fill="none" stroke="none" stroke-width="3.02" d="M70 2.25h0A67.75 67.75 0 01137.75 70v0A67.75 67.75 0 0170 137.75h0A67.75 67.75 0 012.25 70v0A67.75 67.75 0 0170 2.25z" />
                        <path d="M70 28.23a41.76 41.76 0 110 83.52 41.76 41.76 0 110-83.52z" fill="none"/>
                        <path d="M70.71 69.1v21.56m18.71-26.11c0 12.4-6.31 18.89-18.71 18.89 0-17.56 5.28-18.89 18.71-18.89zM54.18 53.98c0 13.33 4.13 20.07 16.53 20.07 0-13.43-1.03-20.07-16.53-20.07z" fill="none" stroke="#fff" stroke-width="4.0316" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="stake-text">Stake</span>
                </button>
            </div>

            <div class="vertical-separator"></div>

            <button class="send nq-button-pill light-blue flex-row">
                <svg class="nq-icon" viewBox="0 0 16 12" xmlns="http://www.w3.org/2000/svg"><path d="M10,1l5,5l-5,5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="14" y1="6" x2="1" y2="6" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Send
            </button>
            <button class="receive nq-button-s flex-row">
                <svg class="nq-icon" viewBox="0 0 16 12" xmlns="http://www.w3.org/2000/svg"><path d="M10,1l5,5l-5,5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="14" y1="6" x2="1" y2="6" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Receive
            </button>
        </div>
    </div>

</div>

<script type="module">
    import Iqons from 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.js';
    // Identicon sprite: the REAL @nimiq/iqons@1.6.0 iqons.min.svg is vendored at ../../../../assets/img/iqons.min.svg
    // (consumer projects: `nq add` copies it to ./nimiq/assets/img/iqons.min.svg). The iqons LIBRARY import
    // above stays on the jsdelivr pin — it is code, not artwork. The CDN sprite (byte-identical content)
    // is only the fallback when the local copy is unreachable (e.g. file:// contexts that block fetch).
    const localIqonsSprite = '../../../../assets/img/iqons.min.svg';
    const cdnIqonsSprite = 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.svg';
    Iqons.svgPath = await fetch(localIqonsSprite, { method: 'HEAD' }).then((r) => (r.ok ? localIqonsSprite : cdnIqonsSprite)).catch(() => cdnIqonsSprite);

    for (const el of document.querySelectorAll('.identicon[data-address]')) {
        el.querySelector('img').src = await Iqons.toDataUrl(el.dataset.address);
    }
</script>
</body>
</html>
