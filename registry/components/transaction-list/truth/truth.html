<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TransactionList — upstream truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&family=Fira+Mono&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; margin: 0; padding: 16px; background: white; }

    /* Wallet theme vars used by the component (themes.scss) */
    :root {
        --bg-primary: var(--nimiq-white);
        --body-size: 2rem;
        --small-size: 1.75rem;
        --label-size: 1.75rem;
        --small-label-size: 1.5rem;
        --text-50: rgba(31, 35, 72, 0.5);
        --text-12: rgba(31, 35, 72, 0.12);
    }

    /* Truth stage: wallet main-column width for the list */
    .transaction-list { width: 720px; background: white; }
</style>

<!-- Wallet globals (themes.scss "old main.css' content"), verbatim: flex helpers + button reset -->
<style>
    .flex-row {
        display: flex;
        flex-direction: row;
    }

    button.reset {
        background: none;
        border: none;
        outline: none;
        padding: 0;
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        font-weight: inherit;
        color: inherit;
        text-align: inherit;
        cursor: pointer;
    }
</style>

<!-- Identicon.vue (@nimiq/vue-components) <style scoped>, verbatim -->
<style>
    .identicon img {
        width: 100%;
        height: 100%;
    }
</style>

<!-- Amount.vue (@nimiq/vue-components) <style scoped>, verbatim -->
<style>
    .amount {
        white-space: nowrap;
    }

    .amount.approx::before {
        content: '~ ';
        opacity: 0.5;
    }
</style>

<!-- TransactionList.vue <style scoped> — month-label, verbatim (SCSS expanded) -->
<style>
    .month-label {
        padding: 5rem 2rem 2rem;
        justify-content: space-between;
        align-items: center;
    }

    .month-label label {
        letter-spacing: 1.5px;
        font-size: var(--label-size);
        line-height: 2rem;
        text-transform: uppercase;
        font-weight: bold;
        opacity: 0.4;
    }
</style>

<!-- TransactionListItem.vue <style scoped>, verbatim (SCSS expanded; mixins inlined).
     Vue scoping emulated with [data-v-tx]: without it the global button.reset
     (0,1,1) would beat .transaction (0,1,0) and kill font-size/padding,
     which is not what happens in the wallet. -->
<style>
    .transaction svg[data-v-tx] {
        display: block;
    }

    .transaction[data-v-tx] {
        display: flex;
        align-items: center;
        flex-direction: row;
        width: 100%;
        padding: 1.5rem 1rem;
        border: 0;
        background: transparent;
        border-radius: .75rem;
        cursor: pointer;
        transition: background 400ms var(--nimiq-ease);
        font-size: var(--body-size);
    }

    .transaction[data-v-tx]:hover,
    .transaction[data-v-tx]:focus {
        background: var(--nimiq-highlight-bg);
    }

    .transaction:hover .identicon .cashlink-or-swap[data-v-tx],
    .transaction:focus .identicon .cashlink-or-swap[data-v-tx] {
        border-color: #F2F2F4;
    }

    .transaction[data-v-tx] > * {
        margin: 0rem 1rem;
    }

    .transaction .date[data-v-tx] {
        font-weight: bold;
        text-transform: uppercase;
        opacity: 0.4;
        flex-grow: 0;
        letter-spacing: 0.0125em;
        line-height: 1;
        flex-shrink: 0;
    }

    .transaction .date > .month[data-v-tx] {
        font-size: var(--small-label-size);
        letter-spacing: 0.0667em;
        text-transform: uppercase;
    }

    .transaction .date[data-v-tx],
    .transaction .pending[data-v-tx],
    .transaction .new[data-v-tx],
    .transaction .invalid[data-v-tx] {
        width: 3.75rem;
        text-align: center;
        flex-shrink: 0;
    }

    .transaction .identicon[data-v-tx] {
        position: relative;
        width: 6rem;
        height: 6rem;
        flex-shrink: 0;
    }

    .transaction .identicon img[data-v-tx] { height: 100% }

    .transaction .identicon .cashlink-or-swap[data-v-tx] {
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        bottom: -0.5rem;
        right: -0.125rem;
        color: white;
        background: var(--nimiq-blue-bg);
        border: 0.375rem solid var(--bg-primary);
        transition: border-color 400ms var(--nimiq-ease);
        border-radius: 2rem;
        height: 2.75rem;
        width: 2.75rem;
    }

    .transaction .data[data-v-tx] {
        flex-grow: 1;
        overflow: hidden;
        line-height: 1.4;
    }

    .transaction .data .label[data-v-tx],
    .transaction .data .address[data-v-tx] {
        white-space: nowrap;
        -webkit-mask: linear-gradient(90deg , white, white calc(100% - 3rem), rgba(255,255,255, 0));
        mask: linear-gradient(90deg , white, white calc(100% - 3rem), rgba(255,255,255, 0));
    }

    .transaction .data .label[data-v-tx] {
        font-weight: 600;
    }

    .transaction .data .address[data-v-tx] {
        font-family: 'Fira Mono', monospace;
        word-spacing: -0.2em;
    }

    .transaction .data .time-and-message[data-v-tx] {
        font-size: var(--small-size);
        font-weight: 600;
        color: var(--text-50);
        white-space: nowrap;
        -webkit-mask: linear-gradient(90deg , white, white calc(100% - 3rem), rgba(255,255,255, 0));
        mask: linear-gradient(90deg , white, white calc(100% - 3rem), rgba(255,255,255, 0));
    }

    .transaction .data .time-and-message .dot[data-v-tx] {
        margin: 0 0.875rem;
        opacity: 0.6;
    }

    .transaction .amounts[data-v-tx] {
        --fiat-amount-height: 2.5rem;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        line-height: 1.4;
    }

    .transaction .amounts .amount[data-v-tx] {
        --size: var(--body-size);
        font-weight: bold;
        margin-bottom: 0.5rem;
        padding: 0.25rem 0;
    }

    .transaction .amounts > .fiat-amount[data-v-tx] {
        --size: var(--small-size);
        font-size: var(--size);
        font-weight: 600;
        opacity: 0.4;
        align-items: center;
        line-height: 1;
    }

    .transaction .amounts > .fiat-amount.fiat-loading[data-v-tx] {
        /* @include amount-loading-placeholder(4rem, 1.6rem) */
        min-width: 4rem;
        height: 1.6rem;
        background-color: var(--text-12);
        border-radius: 0.5rem;
        animation: amount-loading-breathe 1s infinite;
    }

    @keyframes amount-loading-breathe {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.2; }
    }

    .transaction .amounts > .fiat-amount.fiat-unavailable[data-v-tx] {
        opacity: 0.3;
    }

    .transaction .amounts[data-v-tx] > * {
        white-space: nowrap;
        text-align: right;
    }

    .transaction .amounts:not(.isIncoming):not(.signalling) .amount[data-v-tx] {
        opacity: 0.6;
    }

    .transaction .amounts:not(.isIncoming):not(.signalling) .amount[data-v-tx]::before {
        content: '-';
        margin-right: -0.1em;
    }

    .transaction .amounts.isIncoming .amount[data-v-tx] {
        color: var(--nimiq-green);
        background: rgba(33, 188, 165, 0.1);
        border-radius: 0.5rem;
        padding: 0.25rem 0.75rem;
        margin-right: -0.75rem;
    }

    .transaction .amounts.isIncoming .amount[data-v-tx]::before {
        content: '+';
        margin-right: -0.1em;
    }
</style>
</head>
<body>

<!-- TransactionList.vue list body, hand-expanded:
     one month-label group + two confirmed TransactionListItems.
     Tx a: outgoing 5.0 NIM to NQ49..., 14 May 22:58, fiat still loading.
     Tx b: incoming 1000 NIM from NQ11..., 14 May 22:34, fiat still loading. -->
<div class="transaction-list">
    <div class="list-element">
        <div class="month-label flex-row"><label>May</label></div>

        <!-- TransactionListItem: state=confirmed, outgoing -->
        <button class="reset transaction confirmed" data-v-tx>
            <div class="date" data-v-tx>
                <span class="day" data-v-tx>14</span><br data-v-tx>
                <span class="month" data-v-tx>May</span>
            </div>
            <div class="identicon" data-v-tx>
                <div class="identicon" data-v-tx data-address="NQ49 Q4GS PG77 NTQT VRC9 6FF0 VXJX FKXF 829U">
                    <img data-v-tx src='data:image/svg+xml,<svg width="64" height="64" viewBox="0 -4 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity=".1" d="M62.3 25.4L49.2 2.6A5.3 5.3 0 0 0 44.6 0H18.4c-1.9 0-3.6 1-4.6 2.6L.7 25.4c-1 1.6-1 3.6 0 5.2l13.1 22.8c1 1.6 2.7 2.6 4.6 2.6h26.2c1.9 0 3.6-1 4.6-2.6l13-22.8c1-1.6 1-3.6.1-5.2z" fill="url(%23identicon_radial)"/><defs><radialGradient id="identicon_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(-63.0033 0 0 -56 63 56)"><stop stop-color="%23260133"/><stop offset="1" stop-color="%231F2348"/></radialGradient></defs></svg>' alt="Nimiq identicon">
                </div>
            </div>
            <div class="data" data-v-tx>
                <div class="address" data-v-tx>NQ49 Q4GS PG77 NTQT VRC9 6FF0 VXJX FKXF 829U</div>
                <div class="time-and-message" data-v-tx>
                    <span data-v-tx>22:58</span>
                </div>
            </div>
            <div class="amounts" data-v-tx>
                <span class="amount" data-v-tx>5.0 <span class="currency nim">NIM</span></span>
                <div class="fiat-amount fiat-loading" data-v-tx>&nbsp;</div>
            </div>
        </button>

        <!-- TransactionListItem: state=confirmed, incoming -->
        <button class="reset transaction confirmed" data-v-tx>
            <div class="date" data-v-tx>
                <span class="day" data-v-tx>14</span><br data-v-tx>
                <span class="month" data-v-tx>May</span>
            </div>
            <div class="identicon" data-v-tx>
                <div class="identicon" data-v-tx data-address="NQ11 Q47D E086 MDXU TEE9 2A9A ALFT LHN1 7NPG">
                    <img data-v-tx src='data:image/svg+xml,<svg width="64" height="64" viewBox="0 -4 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity=".1" d="M62.3 25.4L49.2 2.6A5.3 5.3 0 0 0 44.6 0H18.4c-1.9 0-3.6 1-4.6 2.6L.7 25.4c-1 1.6-1 3.6 0 5.2l13.1 22.8c1 1.6 2.7 2.6 4.6 2.6h26.2c1.9 0 3.6-1 4.6-2.6l13-22.8c1-1.6 1-3.6.1-5.2z" fill="url(%23identicon_radial)"/><defs><radialGradient id="identicon_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(-63.0033 0 0 -56 63 56)"><stop stop-color="%23260133"/><stop offset="1" stop-color="%231F2348"/></radialGradient></defs></svg>' alt="Nimiq identicon">
                </div>
            </div>
            <div class="data" data-v-tx>
                <div class="address" data-v-tx>NQ11 Q47D E086 MDXU TEE9 2A9A ALFT LHN1 7NPG</div>
                <div class="time-and-message" data-v-tx>
                    <span data-v-tx>22:34</span>
                </div>
            </div>
            <div class="amounts isIncoming" data-v-tx>
                <span class="amount" data-v-tx>1000 <span class="currency nim">NIM</span></span>
                <div class="fiat-amount fiat-loading" data-v-tx>&nbsp;</div>
            </div>
        </button>
    </div>
</div>

<script type="module">
    import Iqons from 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.js';
    // Identicon sprite: the REAL @nimiq/iqons@1.6.0 iqons.min.svg is vendored at ../../../../assets/img/iqons.min.svg
    // (consumer projects: `nq add` copies it to ./nimiq/assets/img/iqons.min.svg). The iqons LIBRARY import
    // above stays on the jsdelivr pin — it is code, not artwork. The CDN sprite (byte-identical content)
    // is only the fallback when the local copy is unreachable (e.g. file:// contexts that block fetch).
    const localIqonsSprite = '../../../../assets/img/iqons.min.svg';
    const cdnIqonsSprite = 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.svg';
    Iqons.svgPath = await fetch(localIqonsSprite, { method: 'HEAD' }).then((r) => (r.ok ? localIqonsSprite : cdnIqonsSprite)).catch(() => cdnIqonsSprite);

    for (const el of document.querySelectorAll('.transaction-list .identicon[data-address]')) {
        el.querySelector('img').src = await Iqons.toDataUrl(el.dataset.address);
    }
</script>
</body>
</html>
