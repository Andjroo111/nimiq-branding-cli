<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Identicon — upstream truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; }
</style>

<!-- Component <style scoped> from upstream Identicon.vue, verbatim (scoped to .identicon) -->
<style>
    .identicon {
        width: 10rem;
    }

    .identicon img {
        width: 100%;
        height: 100%;
    }
</style>

<!-- Page/demo state: sample renders the identicon at 128px -->
<style>
    body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: white;
    }
    .identicon {
        width: 128px;
        height: 128px;
    }
</style>
</head>
<body>

<!-- Upstream template, expanded for address "NQ07 0000 0000 0000 0000 0000 0000 0000 0000".
     :src starts as the placeholderDataUrl and is replaced by Iqons.toDataUrl(address),
     exactly like the @Watch('address', { immediate: true }) handler does. -->
<div class="identicon">
    <img src='data:image/svg+xml,<svg width="64" height="64" viewBox="0 -4 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity=".1" d="M62.3 25.4L49.2 2.6A5.3 5.3 0 0 0 44.6 0H18.4c-1.9 0-3.6 1-4.6 2.6L.7 25.4c-1 1.6-1 3.6 0 5.2l13.1 22.8c1 1.6 2.7 2.6 4.6 2.6h26.2c1.9 0 3.6-1 4.6-2.6l13-22.8c1-1.6 1-3.6.1-5.2z" fill="url(%23identicon_radial)"/><defs><radialGradient id="identicon_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(-63.0033 0 0 -56 63 56)"><stop stop-color="%23260133"/><stop offset="1" stop-color="%231F2348"/></radialGradient></defs></svg>'>
</div>

<script type="module">
    import Iqons from 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.js';
    // Equivalent of the component's svgPath setup (file-loader copy of iqons.min.svg)
    Iqons.svgPath = 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.svg';

    // ValidationUtils.normalizeAddress(address) — address is already normalized,
    // and valid (NQ07 burn address), so the watcher takes the Iqons branch.
    const address = 'NQ07 0000 0000 0000 0000 0000 0000 0000 0000';
    document.querySelector('.identicon img').src = await Iqons.toDataUrl(address);
</script>
</body>
</html>
