<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Amount — demo</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; margin: 0; padding: 32px; }

    .amount {
        white-space: nowrap;
    }

    /* Shown when the displayed value was rounded (add class="amount approx") */
    .amount.approx::before {
        content: '~ ';
        opacity: 0.5;
    }
</style>
</head>
<body>
    <!-- 1234567890 luna = 12,345.6789 NIM (thin-space U+202F digit grouping) -->
    <span class="amount">
        12&#8239;345.6789
        <span class="currency nim">NIM</span>
    </span>
</body>
</html>
