<!-- Nimiq Amount: amount in smallest unit, formatted with thin-space (U+202F) digit
     grouping and a currency ticker. Example: 1234567890 luna = 12,345.6789 NIM.
     Group integer digits in threes with &#8239; only when there are more than 4 of them.
     Add the "approx" class to .amount when the value shown was rounded. -->
<span class="amount">
    12&#8239;345.6789
    <span class="currency nim">NIM</span>
</span>
