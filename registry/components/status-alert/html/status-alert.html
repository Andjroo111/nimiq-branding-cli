<!-- Status Alert — requires status-alert.css. The real Nimiq alert/callout pattern
     (nimiq-ui github-callouts.css). Variants: note (info) | tip (success) |
     warning | caution (error) | important. Title labels follow upstream:
     Note / Tip / Warning / Caution / Important (CSS uppercases them). -->

<div class="nq-status-alert note">
  <p class="alert-title">Note</p>
  <p>Your wallet is syncing with the network.</p>
</div>

<div class="nq-status-alert tip">
  <p class="alert-title">Tip</p>
  <p>Payment confirmed! 450 NIM sent successfully.</p>
</div>

<div class="nq-status-alert warning">
  <p class="alert-title">Warning</p>
  <p>Network congestion detected. Transactions may take longer than usual.</p>
</div>

<div class="nq-status-alert caution">
  <p class="alert-title">Caution</p>
  <p>Transaction failed. Insufficient balance for this transfer.</p>
</div>
