<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nimiq AddressDisplay</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; margin: 0; padding: 32px; }

    /* address-display — hardened grid build (locks the 3 columns; can't reflow) */
    .address-display {
        display: grid;
        justify-items: center;
        width: 100%;
        box-sizing: content-box;
        color: rgba(31, 35, 72, .5); /* nimiq-blue with .5 opacity */
        font-size: 3rem;
        font-family: 'Fira Mono', monospace;
    }

    .format-nimiq {
        grid-template-columns: repeat(3, 33%);
        justify-content: space-between;
        max-width: 28.25rem;
    }

    .format-ethereum {
        grid-template-columns: 1fr;
        max-width: 27rem;
    }

    .address-display.copyable:hover,
    .address-display.copyable:focus,
    .address-display.copyable.copied {
        font-weight: 500;
    }

    .chunk {
        margin: 0.875rem 0;
        line-height: 1.11;
        text-align: center;
        box-sizing: border-box;
        white-space: nowrap;
    }

    .format-nimiq .chunk {
        text-transform: uppercase;
    }

    .space {
        font-size: 0;
    }
</style>
</head>
<body>
    <!-- Nimiq address rendered as 9 four-char chunks, 3 per row -->
    <div class="address-display format-nimiq">
        <span class="chunk">NQ07<span class="space">&nbsp;</span></span><span class="chunk">0000<span class="space">&nbsp;</span></span><span class="chunk">0000<span class="space">&nbsp;</span></span><span class="chunk">0000<span class="space">&nbsp;</span></span><span class="chunk">0000<span class="space">&nbsp;</span></span><span class="chunk">0000<span class="space">&nbsp;</span></span><span class="chunk">0000<span class="space">&nbsp;</span></span><span class="chunk">0000<span class="space">&nbsp;</span></span><span class="chunk">0000<span class="space">&nbsp;</span></span>
    </div>
</body>
</html>
