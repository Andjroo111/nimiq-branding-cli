<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>hero-section</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../html/hero-section.css">
<style>
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Mulish', sans-serif; }
</style>
</head>
<body>
<!-- hero-section: nimiq.com home hero (marketing, screenshot-referenced).
     Real 'Nimiq Gods Rays Background' sky (gods-light.webp, blur 60px / brightness .8 like the
     live site), floating translucent hexagons, white 800-weight headline, lavender subtitle,
     light-blue "Create Wallet ↗" pill, WORKS WITH partner row, and the REAL nimiq.com dotted
     world map (world-map.svg) on a white globe arc cresting at the bottom.
     Requires hero-section.css + Mulish (Google Fonts) + vendored assets img/gods-light.webp and
     img/world-map.svg (nq add copies them to ./nimiq/assets/img/; the relative hrefs below assume
     the snippet sits four levels below the project root — adjust to your page location).
     No JS. SVG ids prefixed nq-hs-. -->
<section class="nq-hero-section">
    <!-- REAL nimiq.com hero sky asset ('Nimiq Gods Rays Background'), rendered exactly like the
         live site: absolute inset-0, cover, blur(60px) brightness(.8) over a dark navy base.
         Expects ../../../../assets/img/gods-light.webp (vendored; nq add copies it to
         ./nimiq/assets/img/gods-light.webp). -->
    <div class="nq-hero-section__sky" aria-hidden="true">
        <img class="nq-hero-section__sky-img" src="../../../../assets/img/gods-light.webp" alt="">
    </div>

    <svg class="nq-hero-section__globe" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
        <defs>
            <radialGradient id="nq-hs-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#7d8cff" stop-opacity="0.55"/>
                <stop offset="55%" stop-color="#4f63e6" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#4f63e6" stop-opacity="0"/>
            </radialGradient>
            <clipPath id="nq-hs-clip"><circle cx="600" cy="2122" r="1600"/></clipPath>
            <filter id="nq-hs-blur" x="-5%" y="-5%" width="110%" height="110%"><feGaussianBlur stdDeviation="14"/></filter>
        </defs>
        <ellipse cx="600" cy="528" rx="980" ry="170" fill="url(#nq-hs-glow)"/>
        <!-- blue atmosphere hugging the dome rim: tight bright halo + wider soft bloom -->
        <circle cx="600" cy="2122" r="1604" fill="none" stroke="#6493ff" stroke-width="34" stroke-opacity="0.95" filter="url(#nq-hs-blur)"/>
        <circle cx="600" cy="2122" r="1616" fill="none" stroke="#4f6fe8" stroke-width="64" stroke-opacity="0.5" filter="url(#nq-hs-blur)"/>
        <circle cx="600" cy="2122" r="1600" fill="#ffffff"/>
        <g clip-path="url(#nq-hs-clip)">
            <!-- REAL nimiq.com dotted world map (977x362, #1F2348 @ .2 baked into the asset).
                 Expects ../../../../assets/img/world-map.svg (vendored; nq add copies it to
                 ./nimiq/assets/img/world-map.svg). -->
            <image href="../../../../assets/img/world-map.svg" x="25" y="545" width="1150" height="426"/>
        </g>
    </svg>

    <span class="nq-hero-section__hex nq-hero-section__hex--a"></span>
    <span class="nq-hero-section__hex nq-hero-section__hex--b"></span>
    <span class="nq-hero-section__hex nq-hero-section__hex--c"></span>
    <span class="nq-hero-section__hex nq-hero-section__hex--d"></span>

    <div class="nq-hero-section__inner">
        <h1 class="nq-hero-section__title">Universal Money for<br>Independent Individuals</h1>
        <p class="nq-hero-section__subtitle">In a centralized world, Nimiq gives independence back to&nbsp;you.</p>
        <a class="nq-hero-section__cta" href="#">Create Wallet <span class="nq-hero-section__cta-arrow">&#8599;</span></a>

        <div class="nq-hero-section__partners">
            <span class="nq-hero-section__partners-label">Works with</span>
