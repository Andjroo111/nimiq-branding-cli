<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>backup-banner — truth (upstream wallet AccountOverview.vue .backup-warning.words)</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<style>
body { font-family: 'Mulish', 'Muli', system-ui, sans-serif; background: #fff; margin: 0; padding: 24px; }
/* wallet themes.scss vars used by the component */
:root { --body-size: 2rem; --text-10: rgba(31, 35, 72, 0.1); }
.container { width: 540px; }
/* wallet global flex helper */
.flex-row { display: flex; flex-direction: row; }

/* AccountOverview.vue scoped CSS — .backup-warning block, verbatim (SCSS expanded) */
.backup-warning {
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
    padding: 0.625rem 1rem;
    border-radius: 0.75rem;
    font-size: var(--body-size);
}
.backup-warning .alert-text {
    margin: 0.625rem 0 0.625rem 1rem;
    font-weight: bold;
    line-height: 3.375rem;
}
.backup-warning .alert-text .alert-icon {
    width: calc(1.0625 * var(--body-size));
    margin-bottom: -0.125em;
    flex-shrink: 0;
    display: inline;
}
.backup-warning button { margin: 0.625rem 0.25rem 0.625rem 1rem; }
.backup-warning button .nq-icon {
    display: inline-block;
    font-size: 1.25rem;
    vertical-align: middle;
    margin-bottom: 0.25rem;
    margin-left: 0.625rem;
    transition: transform 0.25s var(--nimiq-ease);
}
.backup-warning button:hover .nq-icon,
.backup-warning button:focus .nq-icon { transform: translateX(0.25rem); }
.backup-warning.words { box-shadow: inset 0 0 0 1.5px var(--text-10); }
</style>
</head>
<body>
<div class="container">
  <!-- v-else-if branch: account has words, not yet backed up -->
  <div class="backup-warning words nq-orange flex-row">
    <span class="alert-text"><svg class="alert-icon" width="17" height="16" viewBox="0 0 17 16" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M15.913 13.333L9.68 1.433a1.333 1.333 0 0 0-2.362 0l-6.232 11.9a1.333 1.333 0 0 0 1.182 1.952H14.73a1.333 1.333 0 0 0 1.182-1.952zm-8.08-7.718a.667.667 0 0 1 1.334 0v4a.667.667 0 1 1-1.334 0v-4zm.682 7.674h.018a.983.983 0 0 0 .967-1.022 1.018 1.018 0 0 0-1.016-.978h-.019a.984.984 0 0 0-.965 1.02c.02.546.468.978 1.015.98z" fill="currentColor"/></svg> There is no &lsquo;forgot password&rsquo;</span>
    <button class="nq-button-pill orange">Backup<svg class="nq-icon" width="16" height="12" viewBox="0 0 16 12" xmlns="http://www.w3.org/2000/svg"><path d="M10,1l5,5l-5,5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="14" y1="6" x2="1" y2="6" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </div>
</div>
</body>
</html>
