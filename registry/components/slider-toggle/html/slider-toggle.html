<!-- Nimiq slider toggle (requires slider-toggle.css + nimiq-style.css).
     Types: type-currency (compact) or type-default (large).
     Add/remove <label> blocks for more options; the checked radio gets the white pill. -->
<div class="slider-toggle type-currency">
    <label>
        <input type="radio" name="currency" value="nim" checked>
        <span>NIM</span>
    </label>
    <label>
        <input type="radio" name="currency" value="btc">
        <span>BTC</span>
    </label>
</div>
