<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Copyable</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; margin: 0; padding: 32px; }

    .copyable {
        position: relative;
        padding: 1.5rem;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: color .3s var(--nimiq-ease);
    }

    .copyable:hover,
    .copyable:focus,
    .copyable.copied {
        color: var(--nimiq-light-blue) !important;
        outline: none;
    }

    .copyable .background {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-image: var(--nimiq-light-blue-bg);
        border-radius: .5rem;
        opacity: 0;
        transition: opacity .3s var(--nimiq-ease);
    }

    .copyable:hover .background,
    .copyable:focus .background,
    .copyable.copied .background {
        opacity: .07;
    }

    .copyable .tooltip {
        pointer-events: none;
        font-size: 1.75rem;
        padding: 0.75rem 1rem;
        background: var(--nimiq-light-blue-bg);
        position: absolute;
        top: -5rem;
        left: 50%;
        margin-left: -3.75rem; /* half width of tooltip */
        border-radius: .5rem;
        color: white;
        font-weight: 600;
        line-height: 1.1;
        box-shadow:
            0px 2px 2.5px rgba(31, 35, 72, 0.02),
            0px 7px 8.5px rgba(31, 35, 72, 0.04),
            0px 18px 38px rgba(31, 35, 72, 0.07);

        /* Animated styles */
        transform: translate3d(0, 1rem, 0);
        opacity: 0;

        transition: transform .3s var(--nimiq-ease), opacity .3s var(--nimiq-ease);
        transition-delay: .2s;
    }

    .copyable .tooltip::after {
        content: '';
        display: block;
        position: absolute;
        width: 2.25rem;
        height: 2rem;
        left: calc(50% - 1.125rem);
        mask-image: url('data:image/svg+xml,<svg viewBox="0 0 18 16" xmlns="http://www.w3.org/2000/svg"><path d="M9 7.12c-.47 0-.93.2-1.23.64L3.2 14.29A4 4 0 0 1 0 16h18a4 4 0 0 1-3.2-1.7l-4.57-6.54c-.3-.43-.76-.64-1.23-.64z" fill="white"/></svg>');
        z-index: 1000; /* move above tooltip-box's box-shadow */
        background: #1A6AD2;
        transform: rotate(180deg) translateY(-0.75rem);
    }

    .copyable.copied .tooltip {
        transition-delay: 0s;
        pointer-events: all;
        opacity: 1;
        transform: translate3d(0, 0, 0);
    }
</style>
</head>
<body>
    <div class="copyable" tabindex="0" onclick="copyableCopy(this)">
        <div class="background"></div>
        NQ07 0000 ...
        <div class="tooltip">Copied</div>
    </div>

    <script>
    // Copies the element's own text (minus the tooltip label) and shows the
    // "Copied" tooltip for 800ms, like the upstream Copyable component.
    function copyableCopy(el) {
        var label = el.querySelector('.tooltip').textContent;
        var text = el.innerText.replace(new RegExp('\\s*' + label + '$'), '');
        if (navigator.clipboard) navigator.clipboard.writeText(text);
        el.classList.add('copied');
        clearTimeout(el._copiedResetTimeout);
        el._copiedResetTimeout = setTimeout(function () { el.classList.remove('copied'); }, 800);
    }
    </script>
</body>
</html>
