<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tooltip — demo</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; margin: 0; }

    /* demo page: 400x300 container framing the trigger */
    .demo-container {
        position: relative;
        width: 400px;
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Nimiq Tooltip */
    .tooltip {
        display: inline-block;
        position: relative;
        line-height: 1;
    }

    .tooltip .trigger {
        position: relative;
        display: inline-block;
        vertical-align: bottom;
        text-decoration: none;
        outline: none;
        cursor: default;
        color: inherit;
    }

    .tooltip .trigger svg:first-child:last-child,
    .tooltip .trigger img:first-child:last-child {
        display: block;
    }

    /* The arrow, masked out of a triangle SVG */
    .tooltip .trigger::after {
        opacity: 0;
        content: '';
        display: block;
        position: absolute;
        width: 2.25rem;
        height: 2rem;
        left: calc(50% - 1.125rem);
        mask-image: url('data:image/svg+xml,<svg viewBox="0 0 18 16" xmlns="http://www.w3.org/2000/svg"><path d="M9 7.12c-.47 0-.93.2-1.23.64L3.2 14.29A4 4 0 0 1 0 16h18a4 4 0 0 1-3.2-1.7l-4.57-6.54c-.3-.43-.76-.64-1.23-.64z" fill="white"/></svg>');
        transition: opacity .3s var(--nimiq-ease), .3s visibility;
        transition-delay: 16ms;
        visibility: hidden;
        z-index: 1000;
    }

    .tooltip[class*='position-top'] .trigger::after {
        top: -2rem;
        transform: scaleY(-1);
    }
    .tooltip[class*='position-bottom'] .trigger::after {
        top: 100%;
    }
    .tooltip[class*='position-left'] .trigger::after {
        top: 50%;
        left: -2.25rem;
        transform: translateY(-50%) rotate(90deg);
    }
    .tooltip[class*='position-right'] .trigger::after {
        top: 50%;
        left: 100%;
        transform: translateY(-50%) rotate(-90deg);
    }

    /* Arrow color = the nimiq-blue-bg gradient color where the arrow touches the box */
    .tooltip.position-top-left .trigger::after,
    .tooltip.position-left-top .trigger::after {
        background: var(--background, #250737);
    }
    .tooltip.position-top-center .trigger::after,
    .tooltip.position-left-center .trigger::after {
        background: var(--background, #23123e);
    }
    .tooltip.position-top-right .trigger::after,
    .tooltip.position-left-bottom .trigger::after {
        background: var(--background, #211e45);
    }
    .tooltip[class*='position-bottom'] .trigger::after,
    .tooltip[class*='position-right'] .trigger::after {
        background: var(--background, var(--nimiq-blue));
    }

    .tooltip.inverse-theme .trigger::after {
        background: var(--background, white);
    }

    .tooltip.shown .trigger::after {
        opacity: 1;
        visibility: visible;
    }

    .tooltip .tooltip-box {
        contain: layout paint style;
        position: absolute;
        color: white;
        background: var(--background, var(--nimiq-blue-bg));
        padding: 1.5rem;
        border-radius: .5rem;
        font-size: 1.75rem;
        line-height: 1.5;
        font-weight: 600;
        transition: opacity .3s var(--nimiq-ease);
        box-shadow: 0 1.125rem 2.275rem rgba(0, 0, 0, 0.11);
        z-index: 999;
    }

    .tooltip.inverse-theme .tooltip-box {
        color: var(--nimiq-blue);
        background: white;
    }

    .tooltip[class*='position-top'] .tooltip-box {
        transform: translateY(-2rem);
    }
    .tooltip[class*='position-bottom'] .tooltip-box {
        transform: translateY(2rem);
    }
    .tooltip[class*='position-left'] .tooltip-box {
        transform: translateX(-2rem);
    }
    .tooltip[class*='position-right'] .tooltip-box {
        transform: translateX(2rem);
    }
</style>
</head>
<body>
    <!-- Tooltip shown above (top right of) an info-circle trigger.
         Position the box relative to the trigger:
           left = triggerWidth/2 - 25px, top = -boxHeight (here: -16px / -66px) -->
    <div class="demo-container">
        <span class="tooltip position-top-right shown">
            <a href="javascript:void(0);" tabindex="0" class="trigger">
                <svg class="nq-icon" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><line x1="8" y1="7.83301" x2="8" y2="11.333" stroke="currentColor" fill="none" stroke-linecap="round"/><circle cx="8" cy="4.75" r="0.5" fill="currentColor" stroke="currentColor" stroke-width="0.5"/><circle cx="8" cy="8" r="7.5" stroke="currentColor" fill="none"/></svg>
            </a>
            <div class="tooltip-box" style="top: -66px; left: -16px; width: 25rem;">
                Transactions are free on Nimiq.
            </div>
        </span>
    </div>
</body>
</html>
