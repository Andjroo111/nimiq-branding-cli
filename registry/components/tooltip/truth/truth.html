<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tooltip — truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; margin: 0; }

    /* page chrome: 400x300 demo container framing the trigger */
    .demo-container {
        position: relative;
        width: 400px;
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Tooltip.vue scoped styles — verbatim ('>>>' deep selectors flattened) */
    .tooltip {
        /* contain: layout style; */
        display: inline-block;
        position: relative;
        line-height: 1;
    }

    .trigger {
        /* contain: layout style; */
        position: relative;
        display: inline-block;
        vertical-align: bottom;
        text-decoration: none;
        outline: none;
        cursor: default;
        color: inherit;
    }

    .trigger svg:first-child:last-child,
    .trigger img:first-child:last-child {
        display: block;
    }

    .trigger::after {
        opacity: 0;
        content: '';
        display: block;
        position: absolute;
        width: 2.25rem;
        height: 2rem;
        left: calc(50% - 1.125rem);
        mask-image: url('data:image/svg+xml,<svg viewBox="0 0 18 16" xmlns="http://www.w3.org/2000/svg"><path d="M9 7.12c-.47 0-.93.2-1.23.64L3.2 14.29A4 4 0 0 1 0 16h18a4 4 0 0 1-3.2-1.7l-4.57-6.54c-.3-.43-.76-.64-1.23-.64z" fill="white"/></svg>');
        transition: opacity .3s var(--nimiq-ease), .3s visibility;
        transition-delay: 16ms; /* delay one animation frame for better sync with tooltipBox */
        visibility: hidden;
        z-index: 1000; /* move above tooltip-box's box-shadow */
    }

    [class*='position-top'] .trigger::after {
        top: -2rem;
        transform: scaleY(-1);
    }
    [class*='position-bottom'] .trigger::after {
        top: 100%;
    }
    [class*='position-left'] .trigger::after {
        top: 50%;
        left: -2.25rem;
        transform: translateY(-50%) rotate(90deg);
    }
    [class*='position-right'] .trigger::after {
        top: 50%;
        left: 100%;
        transform: translateY(-50%) rotate(-90deg);
    }

    .position-top-left .trigger::after,
    .position-left-top .trigger::after {
        background: var(--background, #250737);
    }
    .position-top-center .trigger::after,
    .position-left-center .trigger::after {
        background: var(--background, #23123e);
    }
    .position-top-right .trigger::after,
    .position-left-bottom .trigger::after {
        background: var(--background, #211e45);
    }
    [class*='position-bottom'] .trigger::after,
    [class*='position-right'] .trigger::after {
        background: var(--background, var(--nimiq-blue));
    }

    .inverse-theme .trigger::after {
        background: var(--background, white);
    }

    .shown .trigger::after {
        opacity: 1;
        visibility: visible;
    }

    .tooltip-box {
        contain: layout paint style;
        position: absolute;
        color: white;
        background: var(--background, var(--nimiq-blue-bg));
        padding: 1.5rem;
        border-radius: .5rem;
        font-size: 1.75rem;
        line-height: 1.5;
        font-weight: 600;
        transition: opacity .3s var(--nimiq-ease);
        box-shadow: 0 1.125rem 2.275rem rgba(0, 0, 0, 0.11);
        z-index: 999;
    }

    .inverse-theme .tooltip-box {
        color: var(--nimiq-blue);
        background: white;
    }

    .tooltip-box.transition-fade-enter,
    .tooltip-box.transition-fade-leave-to {
        opacity: 0;
    }

    [class*='position-top'] .tooltip-box {
        transform: translateY(-2rem);
    }

    [class*='position-bottom'] .tooltip-box {
        transform: translateY(2rem);
    }

    [class*='position-left'] .tooltip-box {
        transform: translateX(-2rem);
    }

    [class*='position-right'] .tooltip-box {
        transform: translateX(2rem);
    }
</style>
</head>
<body>
    <!-- Tooltip: forced visible (shown), preferredPosition="top right" (default) => positionCssClass "position-top-right",
         trigger slot = InfoCircleIcon (@nimiq/style info-circle.svg wrapped with class nq-icon),
         styles={ width: '25rem' }, no container prop.
         JS-computed inline styles, expanded by hand:
           left = triggerWidth/2 - 25 = 18/2 - 25 = -16px   (trigger = 1em icon at body font-size 2.25rem = 18px)
           top  = -tooltipBox.offsetHeight = -66px           (2 lines * 1.5 * 1.75rem + 2 * 1.5rem padding)
    -->
    <div class="demo-container">
        <span class="tooltip position-top-right shown">
            <a href="javascript:void(0);" tabindex="0" class="trigger">
                <svg class="nq-icon" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><line x1="8" y1="7.83301" x2="8" y2="11.333" stroke="currentColor" fill="none" stroke-linecap="round"/><circle cx="8" cy="4.75" r="0.5" fill="currentColor" stroke="currentColor" stroke-width="0.5"/><circle cx="8" cy="8" r="7.5" stroke="currentColor" fill="none"/></svg>
            </a>
            <div class="tooltip-box" style="top: -66px; left: -16px; width: 25rem;">
                Transactions are free on Nimiq.
            </div>
        </span>
    </div>
</body>
</html>
