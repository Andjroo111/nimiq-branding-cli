<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StatusScreen — truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Mulish', sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--nimiq-gray);
    }

    /* SmallPage.vue scoped CSS (verbatim) — standard card frame, as in hub CheckoutTransmission.vue */
    .small-page {
        width: 100%;
        max-width: 52.5rem; /* 420px */
        height: 70.5rem; /* 564px */
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        margin: 0 1.25rem;
    }
</style>
<!-- StatusScreen.vue scoped CSS, verbatim -->
<style>
    .status-screen {
        --status-screen-margin: .75rem;
        display: flex;
        flex-direction: column;
        border-radius: 0.625rem;
        width: calc(100% - 2 * var(--status-screen-margin));
        height: calc(100% - 2 * var(--status-screen-margin));
        margin: var(--status-screen-margin);
        z-index: 1000;
        position: relative;
        flex-grow: 1;
    }

    .wrapper {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        flex-grow: 1;
        border-radius: 0.625rem;
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
    }

    .icon-row,
    .status-row,
    .action-row {
        width: 100%;
        text-align: center;
    }

    .success .icon-row {
        margin-top: 2rem;
    }

    .status-row {
        --status-font-size: 2.5rem;
        margin-top: 2rem; /* Same as title margin-bottom, to equalize spacing to center icon */
        margin-bottom: 5rem;
        height: var(--status-font-size); /* 1 line of status text. For multiple lines, the text overflows to the top */
        position: relative;
    }

    .status-screen.small .status-row {
        margin-bottom: 2.5rem;
    }

    .status {
        position: absolute;
        bottom: 0;
        width: 100%;
        margin: 0;
        padding: 0 2rem;
        font-size: var(--status-font-size);
        font-weight: normal;
        line-height: 1.2;
        opacity: 1;
    }

    .status-screen.small .status {
        /* on small layout center multiple lines vertically instead of overflowing to the top */
        transform: translateY(calc(50% - var(--status-font-size) / 2));
    }

    .status-row.transition .status {
        transition: transform 500ms, opacity 500ms;
    }

    .status-row.transition .status.current {
        transform: translateY(-100%);
        opacity: 0;
    }

    .status-screen.small .status-row.transition .status.current {
        /* on small layout move message less to avoid that it flies over half the screen */
        transform: translateY(calc(-1 * var(--status-font-size)));
    }

    .status-row:not(.transition) .status.next {
        transform: translateY(100%);
        opacity: 0;
    }

    .spacer {
        padding-top: 2rem;
    }

    .success .spacer {
        padding-top: 6rem;
    }

    .spacer.with-main-action {
        padding-bottom: 8rem;
    }

    .spacer.with-alternative-action {
        margin-bottom: 2rem;
    }

    .action-row {
        padding-bottom: 2rem;
    }

    .action-row .nq-link {
        color: white;
        font-size: 2rem;
    }

    /* FADE transitions */

    .fade-loading-leave-active,
    .fade-result-leave-active {
        transition: opacity 300ms;
    }

    .fade-loading-enter-active,
    .fade-result-enter-active {
        transition: opacity 700ms 300ms;
    }

    .fade-loading-enter,
    .fade-loading-leave-to,
    .fade-result-enter,
    .fade-result-leave-to {
        opacity: 0;
    }
</style>
<!-- StatusScreen.vue unscoped CSS, verbatim -->
<style>
    .status-screen .title {
        line-height: 1;
        margin-top: 4rem;
        white-space: pre-line;
    }

    .status-screen.small .title {
        margin-top: 3rem;
        margin-bottom: 2rem;
        font-size: 2.5rem;
    }

    .status-screen .icon-row .nq-icon {
        margin: auto;
    }

    .status-screen .success .nq-icon {
        font-size: 9rem;
    }

    .status-screen .warning .nq-icon {
        font-size: 10rem;
    }

    .status-screen .error .nq-icon {
        font-size: 12rem;
    }

    .status-screen .icon-row .title,
    .status-screen .icon-row .message {
        margin-left: auto;
        margin-right: auto;
    }

    .status-screen .icon-row .title {
        max-width: 80%;
        line-height: 1.4;
    }

    .status-screen .message {
        max-width: 70%;
        opacity: 1;
    }

    .status-screen.exit-transition {
        /* animation: exit-transition 600ms 1s; */
    }

    @keyframes exit-transition {
        from { transform: scale(1); opacity: 1; }
        80%  { opacity: 0; }
        to   { transform: scale(0); opacity: 0; }
    }

    .status-screen.exit-transition .success .icon-row {
        animation: success-title-slide 1s;
    }

    @keyframes success-title-slide {
        from { transform: translateY(8rem); }
        to   { transform: translateY(0); }
    }

    /* Optional entry animation that components can apply on the status-screen */
    .status-screen.grow-from-bottom-button {
        position: absolute;
        animation: status-screen-grow-from-bottom-button .6s forwards cubic-bezier(0.25, 0, 0, 1);
        overflow: hidden;
    }

    @keyframes status-screen-grow-from-bottom-button {
        0%,
        20% {
            max-width: calc(100% - 12rem);
            max-height: 7.5rem;
            bottom: calc(4.25rem - var(--status-screen-margin));
            left: calc(6rem - var(--status-screen-margin));
            border-radius: 4rem;
        }

        0% {
            opacity: 0;
        }

        25% {
            opacity: 1;
        }

        100% {
            max-width: calc(100% - 2 * var(--status-screen-margin));
            max-height: calc(100% - 2 * var(--status-screen-margin));
            bottom: 0;
            left: 0;
            border-radius: 0.5rem;
        }
    }
</style>
</head>
<body>
    <!-- <SmallPage><StatusScreen state="success" title="Payment successful."/></SmallPage>
         hand-expanded for state === 'success', end-frame of the animation:
         - root gets .exit-transition (bound when state === 'success'); no .nq-blue-bg because
           showLoadingBackground is false once the result state is shown
         - only the success <transition> branch renders; its v-if wrapper is .wrapper.success.nq-green-bg
         - CheckmarkIcon = IconBase(checkmark.svg from @nimiq/style) => svg.nq-icon, verbatim
         - title from hub CheckoutTransmission.vue success state: 'Payment successful.' -->
    <div class="small-page nq-card">
        <div class="status-screen exit-transition">
            <div class="wrapper success nq-green-bg">
                <div class="spacer"></div>

                <div class="icon-row">
                    <svg class="nq-icon" width="74" height="74" viewBox="0 0 74 74" xmlns="http://www.w3.org/2000/svg"><path d="M71.12 1.84a4.5 4.5 0 0 0-6.28 1.04l-42.1 58.74L8.68 47.54a4.5 4.5 0 1 0-6.36 6.37l17.8 17.81a4.57 4.57 0 0 0 6.84-.56l45.2-63.03a4.5 4.5 0 0 0-1.04-6.29z" fill="currentColor" stroke="currentColor" stroke-width=".8"/></svg>
                    <h1 class="title nq-h1">Payment successful.</h1>
                </div>

                <div class="spacer"></div>
            </div>
        </div>
    </div>
</body>
</html>
