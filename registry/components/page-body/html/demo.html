<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PageBody — demo</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Mulish', sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 4rem;
    }

    /* small-page: card-sized flex column container */
    .small-page {
        width: 100%;
        max-width: 52.5rem; /* 420px */
        height: 70.5rem; /* 564px */
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        margin: 0 1.25rem;
    }

    /* page-header: header strip of the card */
    .page-header {
        position: relative;
    }

    /* page-body: scrollable content area that fills the rest of the card */
    .page-body {
        flex-grow: 1;
        overflow-y: auto;
    }
</style>
</head>
<body>
    <div class="small-page nq-card">
        <div class="page-header nq-card-header">
            <h1 class="nq-h1">Settings</h1>
        </div>
        <div class="page-body nq-card-body">
            <p class="nq-text">Manage your accounts, addresses and contacts. Your settings are stored locally on this device and never leave it.</p>
            <p class="nq-text">Changes take effect immediately. You can restore the default settings at any time from the bottom of this page.</p>
        </div>
    </div>
</body>
</html>
