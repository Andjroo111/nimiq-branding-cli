<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PageBody — truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; }

    /* page layout for the snapshot (not part of the component) */
    body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 4rem;
    }

    /* SmallPage.vue <style scoped> — verbatim */
    .small-page {
        width: 100%;
        max-width: 52.5rem; /* 420px */
        height: 70.5rem; /* 564px */
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        margin: 0 1.25rem;
    }

    /* PageHeader.vue <style scoped> — verbatim */
    .page-header {
        position: relative;
    }

    .page-header-back-button {
        font-size: 3rem;
        position: absolute;
        left: 4rem;
        padding-top: .25rem;
        opacity: 0.4;
        transition: opacity .3s var(--nimiq-ease), transform .3s var(--nimiq-ease);
        color: inherit;
    }

    .page-header-back-button svg {
        display: block;
    }

    .page-header-back-button:hover,
    .page-header-back-button:focus {
        opacity: 1;
        transform: translate3D(-0.375rem, 0, 0);
        outline: none;
    }

    @media (max-width: 450px) {
        .page-header-back-button,
        /* Don't move button left on mobile */
        .page-header-back-button:hover,
        .page-header-back-button:focus {
            left: 3rem;
            transform: none;
        }
    }

    .page-header-back-button::after {
        content: '';
        display: block;
        position: absolute;
        left: -1.5rem;
        top: -1.5rem;
        right: -1.5rem;
        bottom: -1.5rem;
    }

    .progress-indicator {
        width: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: row;
        padding: 0.5rem;
        position: absolute;
        left: 0;
        top: 0;
    }

    .progress-indicator .indicator {
        flex-grow: 1;
        height: 0.5rem;
        border-radius: 0.25rem;
        background: #e5e5e5;
        margin: 0.5rem;
    }

    .progress-indicator .indicator.active {
        background: #24bdb6;
    }

    .page-header.has-progress-indicator h1,
    .page-header.has-progress-indicator .page-header-back-button {
        margin-top: 1rem;
    }

    /* PageBody.vue <style scoped> — verbatim */
    .page-body {
        flex-grow: 1;
        overflow-y: auto;
    }
</style>
</head>
<body>
    <!-- <SmallPage> -->
    <div class="small-page nq-card">
        <!-- <PageHeader> (no back arrow, no progress indicator) -->
        <div class="page-header nq-card-header">
            <h1 class="nq-h1">Settings</h1>
        </div>
        <!-- <PageBody> -->
        <div class="page-body nq-card-body">
            <p class="nq-text">Manage your accounts, addresses and contacts. Your settings are stored locally on this device and never leave it.</p>
            <p class="nq-text">Changes take effect immediately. You can restore the default settings at any time from the bottom of this page.</p>
        </div>
    </div>
</body>
</html>
