<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AmountInput — truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; margin: 0; padding: 32px; }

    /* AmountInput.vue scoped styles — verbatim, with Vue's [data-v-*] scoping
       emulated as [data-v-amount] (this is what gives the scoped `input` rule
       higher specificity than .nq-input, exactly as in the real component). */
    .label-input[data-v-amount] {
        position: relative;
        overflow: hidden; /* limit width-finder width to parent available width */
        max-width: 100%;
        height: 100%;
    }

    .width-finder[data-v-amount] {
        position: absolute;
        color: transparent;
        pointer-events: none;
        user-select: none;
        white-space: pre;
        padding: 1.25rem;
    }

    input[data-v-amount] {
        padding: 0 0.25rem;
        max-width: 100%;
        text-align: center;
        transition: width 50ms ease-out, color .2s var(--nimiq-ease);
    }

    .full-width[data-v-amount] {
        width: 1000px;
    }

    .amount-input[data-v-amount] {
        display: flex;
        align-items: baseline;
        justify-content: center;
        width: 100%;
        font-size: 8rem;
        color: rgba(31, 35, 72, 0.5); /* Based on Nimiq Blue */
        transition: color .2s var(--nimiq-ease);
    }

    .amount-input.has-value[data-v-amount] {
        color: var(--nimiq-blue);
    }

    .amount-input.focussed[data-v-amount] {
        color: var(--nimiq-light-blue);
    }

    .amount-input form[data-v-amount] {
        display: flex;
    }

    .amount-input .nim[data-v-amount] {
        margin-left: 1rem;
        font-size: 4rem;
        font-weight: 700;
        line-height: 4.5rem;
    }
</style>
</head>
<body>
    <!-- AmountInput: "100.00" entered (valueInLuna=10000000, decimals=5), maxFontSize=8,
         placeholder="0", vanishing=false, currency="nim", unfocused.
         Classes: has-value (valueInLuna > 0), no focussed; .full-width gains .width-finder
         after mounted() sets maxWidth (script below replicates mounted + updateWidth). -->
    <div class="amount-input has-value" data-v-amount>
        <form class="label-input" data-v-amount>
            <span class="width-finder width-placeholder" data-v-amount>0</span>
            <div class="full-width" data-v-amount>Width</div>
            <span class="width-finder width-value" data-v-amount>100.00</span>
            <input type="text" inputmode="decimal" class="nq-input" data-v-amount
                placeholder="0"
                style="width: 50px; font-size: 8rem;"
                value="100.00">
        </form>
        <span class="nim nim" data-v-amount>NIM</span>
    </div>

    <script>
        // Replicates AmountInput.mounted() + updateWidth() once, deterministically.
        (async () => {
            await new Promise((r) => window.addEventListener('load', r, { once: true }));
            await document.fonts.ready;

            const maxFontSize = 8;
            const form = document.querySelector('.label-input');
            const fullWidthDiv = document.querySelector('.full-width');
            const widthPlaceholder = document.querySelector('.width-placeholder');
            const widthValue = document.querySelector('.width-value');
            const input = document.querySelector('input');

            // mounted(): measure available width while .full-width is still in flow
            const maxWidth = form.offsetWidth;
            fullWidthDiv.classList.add('width-finder');

            // updateWidth()
            const placeholderWidth = widthPlaceholder.offsetWidth;
            const valueWidth = widthValue.offsetWidth;
            const fontSizeFactor = Math.min(1.0, Math.max(maxWidth / valueWidth, 1 / maxFontSize));
            const fontSize = fontSizeFactor * maxFontSize;
            const width = input.value
                ? (fontSizeFactor === 1 ? valueWidth : maxWidth)
                : placeholderWidth;
            input.style.width = width + 'px';
            input.style.fontSize = fontSize + 'rem';
        })();
    </script>
</body>
</html>
