<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nimiq AmountInput</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; margin: 0; padding: 32px; }

    /* amount-input */
    .amount-input {
        display: flex;
        align-items: baseline;
        justify-content: center;
        width: 100%;
        font-size: 8rem;
        color: rgba(31, 35, 72, 0.5); /* Based on Nimiq Blue */
        transition: color .2s var(--nimiq-ease);
    }

    .amount-input.has-value {
        color: var(--nimiq-blue);
    }

    .amount-input.focussed {
        color: var(--nimiq-light-blue);
    }

    .amount-input form {
        display: flex;
    }

    .amount-input .label-input {
        position: relative;
        overflow: hidden; /* limit width-finder width to parent available width */
        max-width: 100%;
        height: 100%;
    }

    .amount-input .width-finder {
        position: absolute;
        color: transparent;
        pointer-events: none;
        user-select: none;
        white-space: pre;
        padding: 1.25rem;
    }

    .amount-input .full-width {
        width: 1000px;
    }

    .amount-input input {
        padding: 0 0.25rem;
        max-width: 100%;
        text-align: center;
        transition: width 50ms ease-out, color .2s var(--nimiq-ease);
    }

    .amount-input .nim {
        margin-left: 1rem;
        font-size: 4rem;
        font-weight: 700;
        line-height: 4.5rem;
    }
</style>
</head>
<body>
    <!-- Amount of 100.00 NIM entered, unfocused. The hidden .width-finder spans mirror the
         placeholder and the current value so the script below can fit the input's width
         (and shrink the font when the value would overflow). -->
    <div class="amount-input has-value">
        <form class="label-input">
            <span class="width-finder width-placeholder">0</span>
            <div class="full-width">Width</div>
            <span class="width-finder width-value">100.00</span>
            <input type="text" inputmode="decimal" class="nq-input"
                placeholder="0"
                style="width: 50px; font-size: 8rem;"
                value="100.00">
        </form>
        <span class="nim nim">NIM</span>
    </div>

    <script>
        // Fits the input's width to its content and shrinks the font when the
        // value would overflow the available space (max font size: 8rem).
        (async () => {
            await new Promise((r) => window.addEventListener('load', r, { once: true }));
            await document.fonts.ready;

            const maxFontSize = 8;
            const form = document.querySelector('.amount-input .label-input');
            const fullWidthDiv = form.querySelector('.full-width');
            const widthPlaceholder = form.querySelector('.width-placeholder');
            const widthValue = form.querySelector('.width-value');
            const input = form.querySelector('input');

            // Measure available width while .full-width is still in flow
            const maxWidth = form.offsetWidth;
            fullWidthDiv.classList.add('width-finder');

            const placeholderWidth = widthPlaceholder.offsetWidth;
            const valueWidth = widthValue.offsetWidth;
            const fontSizeFactor = Math.min(1.0, Math.max(maxWidth / valueWidth, 1 / maxFontSize));
            const fontSize = fontSizeFactor * maxFontSize;
            const width = input.value
                ? (fontSizeFactor === 1 ? valueWidth : maxWidth)
                : placeholderWidth;
            input.style.width = width + 'px';
            input.style.fontSize = fontSize + 'rem';
        })();
    </script>
</body>
</html>
