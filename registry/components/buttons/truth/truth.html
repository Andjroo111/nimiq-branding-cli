<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons — truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; background: white; }
</style>
</head>
<body>
    <!-- Upstream nimiq-style demo.html "Primary Buttons" markup, verbatim.
         .nq-button is display:block; margin:2rem auto — buttons stack as a centered column. -->
    <button class="nq-button">Regular button</button>
    <button class="nq-button light-blue">Light-blue button</button>
    <button class="nq-button green">Green button</button>
    <button class="nq-button orange">Orange button</button>
    <button class="nq-button red">Red button</button>
    <button class="nq-button" disabled>Disabled button</button>
</body>
</html>
