<!-- Nimiq PaymentInfoLine (checkout header line). Include payment-info-line.css.
     Sample state: 199.6 NIM / 2.99 € to shop.nimiq.com, timer frozen at 10 of 15
     minutes left. Sized for its container (upstream sits on a 52.5rem SmallPage).

     Slots to adapt:
       - .amount text + ticker, .fiat-amount text (fiat line + its .tooltip wrapper
         are optional; the price-breakdown tooltip box needs the 'tooltip' component)
       - .label text = shop origin domain; replace the identicon <div> with
         <img class="identicon account-image" src="..."> for a shop logo
       - timer: stroke-dasharray = "L*(1-progress) L*progress", offset = L/4 - gap,
         where L = 2π·12 ≈ 75.398 (see the math in the registry truth file);
         countdown text = remaining time in its largest unit. Add .little-time-left
         next to .time-shown when >= 75% elapsed (turns orange). Omit the whole
         .timer <span> when there is no expiry.
       - the arrow icon animates (shooting arrow) on the live page -->
<div class="payment-info-line">
    <div class="info-line">
        <div class="amounts">
            <span class="amount">
                199.6
                <span class="currency nim">NIM</span>
            </span>
            <span class="tooltip price-tooltip">
                <a href="javascript:void(0);" tabindex="0" class="trigger"><!--
                    --><span class="fiat-amount">2.99&nbsp;€</span><!--
                --></a>
            </span>
        </div>
        <div class="arrow-runway">
            <svg width="16" height="12" viewBox="0 0 16 12" xmlns="http://www.w3.org/2000/svg" class="nq-icon"><path d="M10,1l5,5l-5,5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="14" y1="6" x2="1" y2="6" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="account row">
            <div class="identicon-and-label">
                <div class="identicon" data-address="NQ07 0000 0000 0000 0000 0000 0000 0000 0000">
                    <img src='data:image/svg+xml,<svg width="64" height="64" viewBox="0 -4 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity=".1" d="M62.3 25.4L49.2 2.6A5.3 5.3 0 0 0 44.6 0H18.4c-1.9 0-3.6 1-4.6 2.6L.7 25.4c-1 1.6-1 3.6 0 5.2l13.1 22.8c1 1.6 2.7 2.6 4.6 2.6h26.2c1.9 0 3.6-1 4.6-2.6l13-22.8c1-1.6 1-3.6.1-5.2z" fill="url(%23identicon_radial)"/><defs><radialGradient id="identicon_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(-63.0033 0 0 -56 63 56)"><stop stop-color="%23260133"/><stop offset="1" stop-color="%231F2348"/></radialGradient></defs></svg>' alt="Nimiq identicon">
                </div>
                <div class="label">shop.nimiq.com</div>
            </div>
        </div>
        <span class="tooltip timer time-shown">
            <a href="javascript:void(0);" tabindex="0" class="trigger">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 26">
                    <circle class="time-circle" cx="50%" cy="50%" r="12"
                        stroke-dasharray="50.26548245743669 25.132741228718345"
                        stroke-dashoffset="-6.283185307179586"
                        stroke-width="2"></circle>
                    <circle class="filler-circle" cx="50%" cy="50%" r="12"
                        stroke-dasharray="17.132741228718345 58.26548245743669"
                        stroke-dashoffset="14.849555921538759"
                        stroke-width="2"></circle>
                    <text class="countdown" x="50%" y="50%">10</text>
                </svg>
            </a>
        </span>
    </div>
</div>

<script type="module">
    // Swap the hexagon placeholder for the generated identicon (pinned CDN).
    // Scoped to .payment-info-line roots; each img is derived from its own
    // data-address, so running this once per embedded snippet is harmless.
    import Iqons from 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.js';
    // Identicon sprite: the REAL @nimiq/iqons@1.6.0 iqons.min.svg is vendored at ../../../../assets/img/iqons.min.svg
    // (consumer projects: `nq add` copies it to ./nimiq/assets/img/iqons.min.svg). The iqons LIBRARY import
    // above stays on the jsdelivr pin — it is code, not artwork. The CDN sprite (byte-identical content)
    // is only the fallback when the local copy is unreachable (e.g. file:// contexts that block fetch).
    const localIqonsSprite = '../../../../assets/img/iqons.min.svg';
    const cdnIqonsSprite = 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.svg';
    Iqons.svgPath = await fetch(localIqonsSprite, { method: 'HEAD' }).then((r) => (r.ok ? localIqonsSprite : cdnIqonsSprite)).catch(() => cdnIqonsSprite);
    for (const el of document.querySelectorAll('.payment-info-line .identicon[data-address]')) {
        el.querySelector('img').src = await Iqons.toDataUrl(el.dataset.address);
    }
</script>
