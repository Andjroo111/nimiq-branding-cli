<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Page Footer — Nimiq</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Mulish', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }

    /* SmallPage: 420x564 card container */
    .small-page {
        width: 100%;
        max-width: 52.5rem; /* 420px */
        height: 70.5rem; /* 564px */
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        margin: 0 1.25rem;
    }

    /* PageFooter: bottom action area of a page/card */
    .page-footer {
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        box-sizing: border-box;
    }

    .page-footer .nq-button {
        margin: 2rem 4.75rem 3rem;
    }
</style>
</head>
<body>
    <div class="small-page nq-card">
        <div class="page-footer nq-card-footer">
            <button class="nq-button light-blue">Continue</button>
        </div>
    </div>
</body>
</html>
