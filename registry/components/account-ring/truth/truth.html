<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AccountRing — upstream truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; }
</style>

<!-- Component <style scoped> from upstream Identicon.vue, verbatim (scoped to .identicon) -->
<style>
    .identicon {
        width: 10rem;
    }

    .identicon img {
        width: 100%;
        height: 100%;
    }
</style>

<!-- Component <style scoped> from upstream AccountRing.vue, verbatim -->
<style>
    .account-ring {
        position: relative;
        width: 11.25rem;
        --hex-size: 35.556%;
        --hex-height: calc(var(--hex-size) * (24 / 27));
        --gap-x: calc(var(--hex-size) / 12);
        --gap-y: calc(var(--gap-x) * .9);
    }

    /* for setting height automatically depending on width */
    .account-ring::before {
        content: '';
        padding-top: 100%;
        display: block;
    }

    .account {
        width: var(--hex-size);
        height: var(--hex-size);
        position: absolute;
    }

    .account .identicon {
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    .pop-in {
        animation: pop-in 0.5s cubic-bezier(.73,2.08,.48,1) backwards;
    }

    @keyframes pop-in {
        from { transform: scale(0); }
        to   { transform: scale(1); }
    }
    .account:nth-child(1) {
        left: calc(50% - 1.25 * var(--hex-size) - var(--gap-x));
        top: calc(50% - 1 * var(--hex-height) - 0.5 * var(--gap-y));
    }
    .account:nth-child(2) {
        left: calc(50% - 1.25 * var(--hex-size) - var(--gap-x));
        top: calc(50% + 0.5 * var(--gap-y));
    }
    .account:nth-child(3) {
        left: calc(50% - 0.5 * var(--hex-size));
        top: calc(50% + 0.5 * var(--hex-height) + var(--gap-y));
    }
    .account:nth-child(4) {
        left: calc(50% + 0.25 * var(--hex-size) + var(--gap-x));
        top: calc(50% + 0.5 * var(--gap-y));
    }
    .account:nth-child(5) {
        left: calc(50% + 0.25 * var(--hex-size) + var(--gap-x));
        top: calc(50% - 1 * var(--hex-height) - 0.5 * var(--gap-y));
    }
    .account:nth-child(6) {
        left: calc(50% - 0.5 * var(--hex-size));
        top: calc(50% - 1.5 * var(--hex-height) - var(--gap-y));
    }

    .account:nth-child(1) .pop-in { animation-delay: 500ms; }
    .account:nth-child(2) .pop-in { animation-delay: 550ms; }
    .account:nth-child(3) .pop-in { animation-delay: 600ms; }
    .account:nth-child(4) .pop-in { animation-delay: 650ms; }
    .account:nth-child(5) .pop-in { animation-delay: 700ms; }
    .account:nth-child(6) .pop-in { animation-delay: 750ms; }
</style>

<!-- Page/demo state: center the ring at its default size (11.25rem) -->
<style>
    body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: white;
    }
</style>
</head>
<body>

</div>

<script type="module">
    import Iqons from 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.js';
    // Equivalent of the nested Identicon's svgPath setup (file-loader copy of iqons.min.svg)
    // Identicon sprite: the REAL @nimiq/iqons@1.6.0 iqons.min.svg is vendored at ../../../../assets/img/iqons.min.svg
    // (consumer projects: `nq add` copies it to ./nimiq/assets/img/iqons.min.svg). The iqons LIBRARY import
    // above stays on the jsdelivr pin — it is code, not artwork. The CDN sprite (byte-identical content)
    // is only the fallback when the local copy is unreachable (e.g. file:// contexts that block fetch).
    const localIqonsSprite = '../../../../assets/img/iqons.min.svg';
    const cdnIqonsSprite = 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.svg';
    Iqons.svgPath = await fetch(localIqonsSprite, { method: 'HEAD' }).then((r) => (r.ok ? localIqonsSprite : cdnIqonsSprite)).catch(() => cdnIqonsSprite);

    // addresses prop — all three are valid + already normalized, so the nested
    // Identicon watchers take the Iqons.toDataUrl branch; slots 4-6 stay on the placeholder.
    const addresses = [
        'NQ07 0000 0000 0000 0000 0000 0000 0000 0000',
        'NQ21 1111 1111 1111 1111 1111 1111 1111 1111',
        'NQ35 2222 2222 2222 2222 2222 2222 2222 2222',
    ];
    const imgs = document.querySelectorAll('.account-ring .account .identicon img');
    for (let i = 0; i < addresses.length; i++) {
        imgs[i].src = await Iqons.toDataUrl(addresses[i]);
    }
</script>
