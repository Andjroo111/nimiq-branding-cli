    Iqons.svgPath = 'https://cdn.jsdelivr.net/npm/@nimiq/iqons@1.6.0/dist/iqons.min.svg';

    // Scoped per ring root; safe with multiple snippets on one page.
    for (const ring of document.querySelectorAll('.account-ring')) {
