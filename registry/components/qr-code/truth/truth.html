<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>QrCode — upstream truth</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Mulish', sans-serif; }
</style>

<!-- Upstream QrCode.vue has NO <style> block — the component is a bare canvas. -->

<!-- Page/demo state: center the QR code -->
<style>
    body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: white;
    }
</style>
</head>
<body>

<!-- Upstream template, expanded for data="nimiq:NQ07000000000000000000000000000000000000"
     (data is truthy, so the v-if renders the canvas) -->
<canvas class="qr-code"></canvas>

<script src="https://cdn.jsdelivr.net/npm/qr-creator@1.0.0/dist/qr-creator.min.js"></script>
<script>
    // Equivalent of the @Watch(...) _updateQrCode() handler with the sample state:
    // data = 'nimiq:NQ07000000000000000000000000000000000000', size = 240,
    // and all other props at their upstream defaults.
    QrCreator.render({
        text: 'nimiq:NQ07000000000000000000000000000000000000',
        radius: 0.5,            // prop default
        ecLevel: 'M',           // prop default ('errorCorrection')
        fill: {                 // prop default — equivalent to nimiq-light-blue-bg
            type: 'radial-gradient',
            // circle centered in bottom right corner with radius of the size of qr code diagonal
            position: [1, 1, 0, 1, 1, Math.sqrt(2)],
            colorStops: [
                [0, '#265DD7'],
                [1, '#0582CA'], // nimiq-light-blue
            ],
        },
        background: null,       // prop default (transparent)
        size: 240,              // sample state
    }, document.querySelector('.qr-code'));
</script>
</body>
</html>
