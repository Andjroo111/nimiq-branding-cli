     Render with the Nimiq default fill:

     QrCreator.render({
         text: canvas.dataset.qr,
         radius: 0.5,
         ecLevel: 'M',
         fill: {
             type: 'radial-gradient',
             position: [1, 1, 0, 1, 1, Math.sqrt(2)],
             colorStops: [[0, '#265DD7'], [1, '#0582CA']],
         },
         background: null,
         size: Number(canvas.dataset.size || 240),
     }, canvas);
