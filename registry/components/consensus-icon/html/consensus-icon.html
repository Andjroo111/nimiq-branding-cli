<!-- ConsensusIcon: network consensus indicator (sample: ESTABLISHED state).
     States (class on .consensus-icon): syncing | established | connecting | stalled.
     - established: globe + checkmark; turns nimiq-green at full opacity when a parent
       is :hover/:focus/.active (here: static .active wrapper). At rest it inherits color.
     - connecting/stalled: swap the svg for the alert globe (see consensus-icon.css comment);
       forced nimiq-orange.
     - syncing: <div class="world-icon"></div> instead of the svg — animated sprite
       (white strokes; use on dark/colored background). -->
<div class="active">
    <div class="consensus-icon established">
        <svg width="24" height="22" viewBox="0 0 24 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10.84 21a10 10 0 119.73-12.91M14.97 12.22c.02-.4.03-.8.03-1.22 0-5.52-1.8-10-4-10S7 5.48 7 11c0 5.4 1.7 9.79 3.84 10M1.75 8.17h18.6M2 15.02h9.34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M15 18.71L17.29 21 23 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
</div>
