<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BalanceDistribution</title>
<link rel="stylesheet" href="../../../../assets/css/legacy/nimiq-style.min.css">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="balance-distribution.css">
<style>
    /* Sidebar context: navy --bg-secondary: var(--nimiq-blue) */
    body { font-family: 'Mulish', sans-serif; margin: 0; padding: 16px; background: var(--nimiq-blue); }
</style>
</head>
<body>
    <div class="balance-distribution">
        <svg xmlns="http://www.w3.org/2000/svg" width="51" height="51" viewBox="0 0 51 51">
            <circle r="23.5" stroke-width="4" stroke-dasharray="147.655 0" stroke-dashoffset="32.914"
                class="arc nim" data-currency="nim"/>
        </svg>
        <ul class="breakdown">
            <li>
                <div class="currency">nim</div>
                <div class="percentage">100%</div>
            </li>
            <li class="inactive">
                <div class="currency">btc</div>
                <div class="percentage">0%</div>
            </li>
        </ul>
    </div>
</body>
</html>
